project_id = "sample-project"
name = "Sample Hospital Job"
is_default = false
comparison_properties = []
room_label = [
    "$name",
    "Area",
    "$id",
]
milestones = []

[sources.drofus]
type = "file"
path = "../drofus.csv"

[[hierarchy]]
name = "Building"
code_property = "d_building_code"
name_property = "d_building_name"

[[hierarchy]]
name = "Department"
code_property = "Department"

[[builtin_properties]]
canonical = "Area"

[builtin_properties.by_source]
revit = "Area"

[[builtin_properties]]
canonical = "Number"

[builtin_properties.by_source]
revit = "Number"

[[builtin_properties]]
canonical = "Department"

[builtin_properties.by_source]
revit = "Department"

[[drofus_fields]]
label = "Department"
type = "string"
qa = "exact"

[[drofus_fields]]
label = "NetArea"
type = "numeric"
qa = "exact"

[[colour_plans]]
name = "Area vs Perimeter"
active = true

[colour_plans.mode]
kind = "propertycompare"
property_a = "Area"
property_b = "Perimeter"
op = "diff"

[colour_plans.mode.colouring]
style = "diverging"
scheme = "RdYlGn"
