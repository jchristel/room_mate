# Synthetic large floor-plate test project. Its rooms are generated by
# scripts/gen_big_plate.py (not extracted from a real model) to stress the
# viewer at scale and exercise the hierarchy-areas dissolve — see that script's
# header. Building / Department / SubDepartment are resolved from the matching
# room name properties the generator writes.
project_id = "big-plate"
name = "Large Floor Plate (synthetic)"
is_default = false
room_label = ["$name", "Department"]

[[hierarchy]]
name = "Building"
name_property = "Building"

[[hierarchy]]
name = "Department"
name_property = "Department"

[[hierarchy]]
name = "SubDepartment"
name_property = "SubDepartment"
