<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Room Plan</title>
<!-- Shared palette tokens (:root custom properties) live in one file so the
     three sibling pages can't drift; page-specific CSS stays in <style> below. -->
<link rel="stylesheet" href="tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
    display: grid;
    /* header / zones / bottom region (results + source-data grid).
       The bottom row is auto so an empty region costs no plan height.
       `minmax(0, 1fr)` is load-bearing, not decoration: a grid item defaults
       to `min-width: auto`, so the grid's very wide table (dozens of columns)
       would otherwise stretch the single column to its intrinsic width and
       drag `main` — and the plan canvas — out to several thousand pixels. */
    grid-template-rows: auto 1fr auto;
    grid-template-columns: minmax(0, 1fr);
  }

  header {
    display: flex;
    flex-wrap: wrap; /* scope pickers joined the header; degrade by wrapping, not clipping */
    align-items: baseline;
    gap: 0.6rem 1rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--ink);
  }
  header h1 {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0;
  }
  header .links { margin-left: auto; display: flex; gap: 1rem; align-items: baseline; }
  header .links a { color: var(--accent); font-size: 0.72rem; text-decoration: none; }
  header .links a:hover { text-decoration: underline; }

  /* Global scope pickers: project / milestone / building — one scope for the
     whole page (see "single-project viewer", HANDOVER-ui-layout Decision 1). */
  header select.picker {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.25rem 0.4rem;
  }
  header select.picker.hidden { display: none; }

  /* App-wide controls: add/remove zone, link toggle. */
  header button.ctl {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.25rem 0.5rem; cursor: pointer;
  }
  header button.ctl:hover { background: var(--fill); }
  header button.ctl:disabled { opacity: 0.4; cursor: default; }
  header button.ctl.on { border-color: var(--accent); color: var(--accent); font-weight: 600; }

  /* Global room search: input + a "Fields" checklist popover. */
  header .search { position: relative; display: flex; gap: 0.4rem; align-items: center; }
  header #searchInput {
    font-family: var(--mono); font-size: 0.72rem; color: var(--ink);
    background: var(--paper); border: 1px solid var(--ink); padding: 0.25rem 0.5rem;
  }
  .fields-panel {
    position: absolute; top: 100%; left: 0; margin-top: 0.3rem; z-index: 10;
    background: var(--paper); border: 1px solid var(--rule); padding: 0.5rem 0.6rem;
    max-height: 40vh; overflow: auto; min-width: 12rem;
  }
  .fields-panel.hidden { display: none; }
  .fields-panel .fields-actions { margin-bottom: 0.4rem; display: flex; gap: 0.5rem; }
  .fields-panel .fields-actions a { color: var(--accent); font-size: 0.66rem; cursor: pointer; }
  .fields-panel label { display: block; font-size: 0.7rem; white-space: nowrap; cursor: pointer; }

  /* The zone grid. The 1px gap over a dark background is the hairline rule
     between zones. Column count is set on `main` from the zone count. */
  main {
    display: grid;
    gap: 1px;
    background: var(--ink);
    min-height: 0;
  }

  .zone {
    position: relative;
    background: var(--paper);
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }

  /* Per-zone toolbar — a caption strip: this zone's own colour/level pickers
     (presentation) plus its validation toggle and meta line. Scope pickers
     live in the header; a zone never chooses what data it shows. */
  .zone-toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 0.4rem; padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--ink);
  }
  .zone-toolbar select.picker {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.2rem 0.4rem;
  }
  .zone-toolbar select.picker.hidden { display: none; }
  .zone-toolbar button.validation-toggle {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.2rem 0.4rem; cursor: pointer;
  }
  .zone-toolbar button.validation-toggle.issues { border-color: var(--accent); color: var(--accent); }
  .zone-toolbar button.validation-toggle.hidden { display: none; }
  .zone-toolbar button.export-svg {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.2rem 0.4rem; cursor: pointer;
  }
  .zone-toolbar button.export-svg.hidden { display: none; }
  .zone-toolbar .meta { font-size: 0.66rem; letter-spacing: 0.08em; color: var(--accent); margin-left: auto; }
  .zone-toolbar .meta.stale { color: var(--ink); opacity: 0.5; }

  /* The canvas region below the toolbar; holds the SVG, the empty-state note,
     and the validation panel (both absolutely positioned over the SVG). */
  .zone-canvas { position: relative; overflow: hidden; min-height: 0; }
  .zone-canvas svg { width: 100%; height: 100%; display: block; cursor: grab; }
  .zone-canvas svg:active { cursor: grabbing; }

  .grid line { stroke: var(--rule); stroke-width: 0.5; vector-effect: non-scaling-stroke; }

  .room { fill: var(--fill); stroke: var(--ink); stroke-width: 1.5;
          stroke-linejoin: round; transition: fill 0.12s ease; vector-effect: non-scaling-stroke; }
  .room:hover { fill: var(--fill-hover); }
  .room.error { fill: var(--error); }
  .room.error:hover { fill: var(--accent); }
  /* Search: matches get a bold accent outline (composes over any fill — colour
     plan or error); non-matches fade so matches stand out. `.dim` is opacity so
     it works regardless of an inline colour-plan fill. */
  .room.match { stroke: var(--accent); stroke-width: 3; }
  .dim { opacity: 0.15; }
  .hole { fill: var(--paper); stroke: var(--ink); stroke-width: 1;
          stroke-dasharray: 4 3; vector-effect: non-scaling-stroke; }

  .label { fill: var(--ink); text-anchor: middle;
           dominant-baseline: middle; pointer-events: none; }
  .label .tag { fill: var(--accent); letter-spacing: 0.05em; }

  .empty {
    position: absolute; inset: 0; display: grid; place-content: center;
    text-align: center; gap: 0.4rem; color: var(--ink); padding: 1rem;
  }
  .empty strong { font-weight: 600; letter-spacing: 0.05em; }
  .empty span { font-size: 0.72rem; opacity: 0.6; }
  .empty code { background: #0001; padding: 0.1rem 0.4rem; }
  .hidden { display: none; }

  /* --- bottom region: the results band (HANDOVER-ui-layout Decision 2) ---
     Tabular/temporal output lives at the bottom of the page, not in overlays
     covering the plan. Band 1 = results (QA, area figures): sometimes
     visible, collapsed to a one-line strip by default — a fully hidden band
     gets forgotten, an always-open one eats plan area. Each block's body has
     a max height and scrolls internally so a long mismatch list can never
     squeeze the plans; expanding a block never resizes them either (the
     region is auto-height below a cap). Band 2 (the always-on source-data
     grid) is the next step and slots in as a sibling block. */
  /* ONE height for the whole region, user-draggable, now that band 2 (the
     always-visible grid) gives it a persistent height to drag. Expanding a
     band-1 block takes space from the GRID, never from the plans — the plans
     must not resize because a QA run finished. Band 1 blocks are auto-height
     (capped, scrolling internally); the grid flexes into whatever is left. */
  #bottomRegion {
    border-top: 1px solid var(--ink); background: var(--paper);
    display: flex; flex-direction: column;
    /* 20rem, not 16: the region hosts a results band over the grid now, and
       16rem left too little for both once a results block was expanded. */
    height: var(--bottom-h, 20rem); min-height: 0;
    min-width: 0; /* see body's grid-template-columns: the grid must scroll, not stretch */
  }
  #bottomRegion.empty { height: auto; }
  /* Drag handle: the region's whole top edge — resizes the region against
     the plans. The second handle (#bandDivide) splits band 1 against band 2
     *within* that height; the two never fight, because this one moves the
     region's outer edge and that one moves an inner boundary. */
  #regionDrag { flex: 0 0 4px; cursor: row-resize; background: transparent; }
  #regionDrag:hover, #regionDrag.dragging { background: var(--accent); }

  /* Band 1 as a real element, so the split between the results and the grid
     has something to move. Content-sized by default (a collapsed strip costs
     one line); once dragged it takes an explicit height and `.sized` wins. */
  /* `--band1-max` is recomputed in JS as "region minus the grid's own
     minimum", so band 1 can never starve the table — a percentage cap can't
     express that, since the grid's floor depends on its toolbar and header. */
  #band1 { display: flex; flex-direction: column; min-height: 0; flex: 0 1 auto; max-height: var(--band1-max, 65%); }
  #band1.sized { flex: 0 0 var(--band1-h); }
  #bandDivide {
    flex: 0 0 5px; cursor: row-resize; background: var(--rule);
    border-top: 1px solid var(--ink);
  }
  #bandDivide:hover, #bandDivide.dragging { background: var(--accent); }
  #bandDivide.hidden { display: none; }

  .result-band {
    border-bottom: 1px solid var(--rule);
    display: flex; flex-direction: column; min-height: 0;
    flex: 0 0 auto;
  }
  /* An expanded block shares band 1's height with any sibling; a collapsed
     one stays exactly its summary strip. `flex-basis: auto` (not 0) is
     required: band 1 is content-sized until it is dragged, and a zero basis
     would collapse that parent to nothing. */
  .result-band.open { flex: 1 1 auto; }
  .result-band.hidden { display: none; }
  .band-head {
    display: block; width: 100%; text-align: left; flex: 0 0 auto;
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.06em;
    background: none; color: var(--ink); border: none;
    padding: 0.35rem 1.25rem; cursor: pointer;
  }
  .band-head:hover { background: var(--fill); }
  .band-head .issues { color: var(--accent); font-weight: 600; }
  /* Flex inside the region's capped height, so expanded blocks divide it and
     each scrolls internally rather than growing the page. */
  .band-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0.2rem 1.25rem 0.7rem; font-size: 0.72rem; }
  .band-body.hidden { display: none; }
  .band-body section { margin-bottom: 1rem; }
  .band-body section h3 { font-size: 0.68rem; margin: 0 0 0.35rem; }
  .band-body ul { margin: 0; padding-left: 1.1rem; }
  .band-body .mismatch { margin-bottom: 0.3rem; }
  .band-body .ok { opacity: 0.6; }
  /* QA entries are jump targets into the grid below. */
  .band-body [data-room] { cursor: pointer; }
  .band-body [data-room]:hover { color: var(--accent); }
  .band-body button.refresh {
    font-family: var(--mono); font-size: 0.68rem; background: var(--paper);
    color: var(--ink); border: 1px solid var(--ink); padding: 0.25rem 0.5rem;
    cursor: pointer; margin: 0.2rem 0.5rem 0.6rem 0;
  }
  .band-body select.picker {
    font-family: var(--mono); font-size: 0.68rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.2rem 0.4rem; margin-bottom: 0.6rem;
  }

  /* --- hierarchy gross-area footprints: overlay + summary --- */
  .zone-toolbar button.areas-toggle {
    font-family: var(--mono); font-size: 0.72rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); padding: 0.2rem 0.4rem; cursor: pointer;
  }
  .zone-toolbar button.areas-toggle.on { border-color: var(--accent); color: var(--accent); }
  .zone-toolbar button.areas-toggle.hidden,
  .zone-toolbar select.areasTier.hidden { display: none; }
  /* Rooms recede so the dissolved footprints read clearly on top. */
  svg.plan.areas-active .room,
  svg.plan.areas-active .hole { opacity: 0.16; }
  svg.plan.areas-active .label { opacity: 0.22; }
  .area-poly { fill-opacity: 0.32; stroke-width: 2; vector-effect: non-scaling-stroke; }
  /* A group withheld from tiers above (Case-A exclusion) reads as dashed + faint. */
  .area-poly.faded { fill-opacity: 0.12; stroke-dasharray: 5 4; }
  .area-label { fill: var(--ink); text-anchor: middle; dominant-baseline: middle;
                pointer-events: none; font-weight: 600; }
  /* Areas results table (band 1). Table shape shared with the old overlay
     panel; the note/total/swatch styling carried over. */
  .band-body .note { opacity: 0.6; margin: 0 0 0.6rem; }
  .band-body table { border-collapse: collapse; min-width: 34rem; }
  .band-body th, .band-body td { text-align: right; padding: 0.22rem 0.5rem; border-bottom: 1px solid var(--rule); }
  .band-body th:first-child, .band-body td:first-child,
  .band-body th.lvl, .band-body td.lvl { text-align: left; }
  .band-body thead th { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.6; }
  .band-body tr.total td { font-weight: 600; border-top: 2px solid var(--ink); }
  .band-body .swatch { display: inline-block; width: 0.6rem; height: 0.6rem; margin-right: 0.35rem; vertical-align: middle; }
  .band-body .uncounted { opacity: 0.6; font-style: italic; }

  /* --- bottom region, band 2: the source-data grid ---
     Ambient, always visible, not dismissable: the tabular view of what the
     plans show graphically. Takes whatever height band 1 leaves. */
  /* `flex-basis: 0`, not auto: an auto basis resolves to the whole table's
     content height (thousands of px), which would dominate the region's
     shrink distribution and squeeze band 1 to nothing. A zero basis makes
     the grid purely "whatever is left over". */
  #gridBand { flex: 1 1 0; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #gridBand.hidden { display: none; }
  #gridBar {
    flex: 0 0 auto; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;
    padding: 0.3rem 1.25rem; font-size: 0.7rem; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--rule);
  }
  #gridBar label { cursor: pointer; }
  #gridBar .count { margin-left: auto; color: var(--accent); font-size: 0.66rem; }
  #gridBar button {
    font-family: var(--mono); font-size: 0.66rem; background: var(--paper);
    color: var(--ink); border: 1px solid var(--ink); padding: 0.15rem 0.4rem; cursor: pointer;
  }
  /* The scroll container for BOTH axes: rows scroll vertically (windowed —
     only the visible slice is in the DOM), columns horizontally when model +
     dRofus are shown together. */
  #gridScroll { flex: 1 1 auto; overflow: auto; min-height: 0; min-width: 0; }
  /* table-layout:fixed is load-bearing for windowing: content-derived widths
     would jitter as rows swap in and out, since only the visible slice is
     ever measured. */
  #gridTable { border-collapse: collapse; table-layout: fixed; font-size: 0.68rem; }
  #gridTable th, #gridTable td {
    width: 8rem; max-width: 8rem; padding: 0.15rem 0.4rem; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-right: 1px solid var(--rule);
  }
  #gridTable td { border-bottom: 1px solid var(--rule); }
  #gridTable thead th {
    position: sticky; background: var(--paper); z-index: 2;
    font-weight: 600; text-transform: uppercase; font-size: 0.6rem;
    letter-spacing: 0.06em; cursor: pointer; user-select: none;
  }
  /* Two header rows: the source group spans its columns, names sit beneath.
     The group label is pinned to the left of the *scroll viewport* rather
     than centred in its span — a span 48 columns wide centres its label
     thousands of pixels off-screen, so the group would be invisible exactly
     when the table is wide enough to need it. */
  #gridTable thead tr.group th { top: 0; text-align: left; cursor: default; border-bottom: 1px solid var(--ink); }
  #gridTable thead tr.group th > span { position: sticky; left: 0.4rem; display: inline-block; }
  #gridTable thead tr.names th { top: 1.35rem; border-bottom: 1px solid var(--ink); }
  #gridTable thead tr.group th.src-model { color: var(--ink); }
  #gridTable thead tr.group th.src-drofus { color: var(--accent); }
  /* dRofus columns tinted as a block, so the "separate sub-object, never
     merged" boundary is visible rather than implied. */
  #gridTable .src-drofus { background: color-mix(in srgb, var(--accent) 7%, var(--paper)); }
  /* A dRofus column with no Revit counterpart in row 2 of the CSV: shown,
     visibly distinguished, never hidden (see field coverage). */
  #gridTable thead th.unmapped { font-style: italic; opacity: 0.75; }
  #gridTable thead th.sorted::after { content: " ▾"; color: var(--accent); }
  #gridTable thead th.sorted.asc::after { content: " ▴"; }
  #gridTable tbody tr:hover td { background: var(--fill); }
  #gridTable tbody tr.target td { outline: 1px solid var(--accent); }
  /* A cell the QA report disagrees on, marked in place — the (room, field)
     address compute_validation already produces IS a (row, column) here. */
  #gridTable td.err { color: var(--accent); font-weight: 600; background: color-mix(in srgb, var(--error) 45%, transparent); }
  #gridTable tr.spacer td { padding: 0; border: none; }
  #gridFilters input {
    font-family: var(--mono); font-size: 0.62rem; width: 100%;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--rule); padding: 0.1rem 0.2rem;
  }
  #gridEmpty { padding: 0.6rem 1.25rem; font-size: 0.7rem; opacity: 0.6; }
</style>
</head>
<body>
  <header>
    <h1>Room Plan</h1>
    <select class="picker hidden" id="projectSelect" title="Project — the scope of everything on screen"></select>
    <select class="picker hidden" id="milestoneSelect" title="Milestone — Latest or a pinned issue"></select>
    <select class="picker hidden" id="buildingSelect" title="Building"></select>
    <button class="ctl" id="addZone" title="Add a zone">+ zone</button>
    <button class="ctl" id="removeZone" title="Remove the last zone">− zone</button>
    <button class="ctl" id="linkToggle" title="Sync zoom/pan across all zones">Link views: off</button>
    <button class="ctl on" id="labelsToggle" title="Show or hide room labels (SVG export follows)">Labels: on</button>
    <div class="search">
      <input id="searchInput" type="search" placeholder="Search rooms…" autocomplete="off" />
      <button class="ctl" id="fieldsToggle" title="Choose which fields to search">Fields ▾</button>
      <div id="fieldsPanel" class="fields-panel hidden"></div>
    </div>
    <div class="links">
      <a href="/comparison.html">compare</a>
      <a href="/settings.html">settings</a>
    </div>
  </header>
  <main id="zones"></main>

  <!-- Bottom region, band 1: results. One instance per page, never per zone —
       both blocks are scope-derived, and a region that multiplied with zone
       count would stop being a stable place users can point at. -->
  <footer id="bottomRegion">
    <div id="regionDrag" title="Drag to resize the whole panel"></div>
    <div id="band1">
    <div class="result-band hidden" id="qaBand">
      <button class="band-head" id="qaHead">▸ QA</button>
      <div class="band-body hidden" id="qaBody">
        <button class="refresh" id="qaRefresh">Refresh</button>
        <button class="refresh" id="qaDownload">Download CSV</button>
        <div id="qaContent"></div>
      </div>
    </div>
    <div class="result-band hidden" id="areasBand">
      <button class="band-head" id="areasHead">▸ Hierarchy areas</button>
      <div class="band-body hidden" id="areasBody">
        <select class="picker" id="areasBandTier" title="Tier for the figures below"></select>
        <button class="refresh" id="areasDownload">Download CSV</button>
        <div id="areasContent"></div>
      </div>
    </div>
    </div><!-- /#band1 -->

    <!-- The band 1 / band 2 split. Shown only when a band-1 block is actually
         expanded, since there is nothing to redistribute between a collapsed
         summary strip and the grid. -->
    <div id="bandDivide" class="hidden" title="Drag to split space between the results and the table"></div>

    <!-- Band 2: source data. Always visible (never a summary strip) — it is
         the tabular view of the data itself, not the output of an action. -->
    <div id="gridBand" class="hidden">
      <div id="gridBar">
        <strong>Rooms</strong>
        <label><input type="checkbox" id="srcModel" checked /> Model</label>
        <label><input type="checkbox" id="srcDrofus" checked /> dRofus</label>
        <button id="gridClearFilters" title="Clear all column filters">Clear filters</button>
        <button id="gridDownload">Download CSV</button>
        <span class="count" id="gridCount"></span>
      </div>
      <div id="gridScroll"><table id="gridTable"></table></div>
      <div id="gridEmpty" class="hidden"></div>
    </div>
  </footer>

  <!-- One zone's DOM. Cloned per panel by createZone(); every stateful node is
       reached via querySelector on the clone, never a document-wide id. -->
  <template id="zoneTemplate">
    <div class="zone">
      <!-- Presentation only: scope (project/milestone/building) is global and
           lives in the header — zones differ in level and colour, never data. -->
      <div class="zone-toolbar">
        <select class="picker colourSelect hidden"></select>
        <select class="picker levelSelect hidden"></select>
        <button class="export-svg hidden" title="Export every level as its own SVG file">Export SVGs</button>
        <button class="areas-toggle hidden" title="Show hierarchy footprints on this zone's plan">Areas</button>
        <select class="picker areasTier hidden" title="Footprint tier (this zone's overlay)"></select>
        <span class="meta">waiting for data</span>
      </div>
      <div class="zone-canvas">
        <svg class="plan" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="empty">
          <strong>No rooms received yet</strong>
          <span>POST room JSON to <code>/rooms</code>, then this updates.</span>
        </div>
      </div>
    </div>
  </template>

<!-- Shared selection-persistence helpers (seedProjectId / persistSelection),
     the same file settings.html and comparison.html load. -->
<script src="common.js"></script>
<script>
const SVG = "http://www.w3.org/2000/svg";
const zonesEl = document.getElementById("zones");
const zoneTemplate = document.getElementById("zoneTemplate");

// A zone is a PRESENTATION of the one global scope: its own SVG, view
// transform, level and colour selection. Scope (project/milestone/building),
// the poll cursor, the payload, colour-plan config, and validation state are
// module-level singletons — there is exactly one scope on screen, so zones
// can never disagree about what data they show, only how they draw it
// (HANDOVER-ui-layout Decision 1: the single-project viewer). Multiple zones
// exist to show several LEVELS of one building at once.
const zones = [];
let zoneSeq = 0;

// ---- global scope + data (one for the page, not per zone) ----
let projectId = null;
let buildingKey = null;
let milestone = null;        // null = Latest
let currentPayload = null;   // the one /rooms payload every zone renders from
let lastRevision = null;     // poll change-detection cursor
// Picker refresh guards (diff signatures so the 2s tick doesn't fight the user).
let lastProjectIds = null;
let lastBuildingsSignature = null;
let lastMilestonesSignature = null;
// One-shot guards: URL/localStorage restore runs once, then ticks re-default plainly.
let seededProject = false;
let seededScope = false;
// Colour-plan config for the current project (fetched once per project change).
// Which plan is APPLIED stays per zone — that is presentation.
let colourPlans = [];
let colourPlansProjectId = null;
// Validation is project-scoped: one report, one error set, one results block
// in the bottom band. Error highlighting on the plans follows the QA block's
// expansion — page state, since the block it tracks is page-level.
let currentValidation = null;
let errorRoomIds = new Set();
let showErrors = false;
// Hierarchy-areas data is scope-derived, so one dataset serves every zone's
// overlay AND the bottom band's figures. Per zone remain only the overlay
// toggle (areasMode) and the overlay's tier (areasTier); the band's figures
// have their own tier picker (areasBandTier) — overlay is presentation on one
// zone's level, the figures are results over the whole scope.
let areasData = null;
let areasBandTier = 0;

// Global: sync the view transform across every zone when on (see commitView).
let linkViews = false;

// Global: render room labels (default on). Threads through paintLevel's
// options rather than a CSS class on the zone SVG, because the SVG export
// calls paintLevel directly and never sees zone-level classes — a CSS-only
// toggle would be silently ignored by every exported file. Deliberately not
// persisted: linkViews isn't either, and view prefs should persist together
// or not at all (HANDOVER-ui-layout.md, Decision 4 "Persistence").
let showRoomLabels = true;

// Global room search (see the "search" section lower down): one query + one set
// of enabled field keys, applied to every zone. `searchFields` empty means "not
// yet initialised" — populated to all-available on first data / panel build.
let searchQuery = "";
const searchFields = new Set();
let searchFieldsInitialised = false;
// One payload -> one match set; zones share it and differ only in which level's
// matches are visible.
let searchMatchIds = null;
let searchActive = false;

async function fetchJson(url) {
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok) throw new Error(`${url} -> ${res.status}`);
  return res.json();
}

// ======================= pure geometry helpers =======================
// These never touched a global and don't now — they take data and return
// data/elements, so they're shared across every zone unchanged.

function flip(p) { return { x: p.x, y: -p.y }; }

function bounds(rooms) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const r of rooms)
    for (const loop of r.loops)
      for (const raw of loop.points) {
        const p = flip(raw);
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
  if (!isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

function loopBox(loop) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const raw of loop.points) {
    const p = flip(raw);
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  return { w: maxX - minX, h: maxY - minY };
}

function pointsAttr(loop) {
  return loop.points.map(raw => { const p = flip(raw); return `${p.x},${p.y}`; }).join(" ");
}

function centroid(loop) {
  const pts = loop.points.map(flip);
  let a = 0, cx = 0, cy = 0;
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i], q = pts[(i + 1) % pts.length];
    const cross = p.x * q.y - q.x * p.y;
    a += cross; cx += (p.x + q.x) * cross; cy += (p.y + q.y) * cross;
  }
  if (Math.abs(a) < 1e-9) {
    const n = pts.length;
    return { x: pts.reduce((s, p) => s + p.x, 0) / n, y: pts.reduce((s, p) => s + p.y, 0) / n };
  }
  a *= 0.5;
  return { x: cx / (6 * a), y: cy / (6 * a) };
}

// Build the ordered list of levels to show. Prefer the payload's `levels`
// array (ordered by elevation on the server); fall back to deriving from
// rooms if an older payload omits it.
function levelsForPayload(payload) {
  if (Array.isArray(payload.levels) && payload.levels.length) {
    return payload.levels.slice().sort((a, b) => a.elevation - b.elevation);
  }
  const seen = new Map();
  for (const r of payload.rooms || []) {
    const id = r.level_id || "unknown";
    if (!seen.has(id)) seen.set(id, { id, name: id, elevation: 0 });
  }
  return [...seen.values()];
}

function roomsOnLevel(payload, levelId) {
  return (payload.rooms || []).filter(r => (r.level_id || "unknown") === levelId);
}

function line(x1, y1, x2, y2) {
  const l = document.createElementNS(SVG, "line");
  l.setAttribute("x1", x1); l.setAttribute("y1", y1);
  l.setAttribute("x2", x2); l.setAttribute("y2", y2);
  return l;
}
function titleEl(text) {
  const t = document.createElementNS(SVG, "title");
  t.textContent = text;
  return t;
}

// ============================ colour plans ============================
//
// All client-side by design: the server stores `colour_plans` verbatim and
// computes nothing (see settings `colour_plans`). All three modes —
// property-compare, hierarchy, date-range — are wired here. Every function in
// this block is pure (data in, colour/number out) and zone-agnostic; a zone
// only carries the *selected* plan (`zone.activeColourPlan`).

// Fill for a room the active plan can't colour — missing/unparseable property,
// ratio-by-zero, a value in a gap between bands, or an undefined hierarchy
// tier. A muted neutral, deliberately distinct from --fill so "not coloured by
// this plan" reads as a state, not a bug.
const NO_DATA_COLOUR = "#c9c2b0";
// match mode is binary and needs no palette — two fixed, colour-blind-safe
// stops (ColorBrewer RdYlGn extremes): within tolerance vs. not.
const MATCH_COLOUR = "#1a9850";     // green: |A−B| within tolerance
const MISMATCH_COLOUR = "#d73027";  // red:   outside tolerance
// date-range: a date after near_date is "future" — a fixed blue, separate from
// the green→red near/far ramp (the RdYlGn scheme has no blue of its own).
const FUTURE_COLOUR = "#2c7fb8";

// A few ColorBrewer schemes as literal hex stops — no d3/npm, the browser
// layer stays a zero-build vanilla page. Sampled at t∈[0,1] by `sampleScheme`.
const SCHEMES = {
  RdBu: ["#ca0020", "#f4a582", "#f7f7f7", "#92c5de", "#0571b0"],
  RdYlGn: ["#d7191c", "#fdae61", "#ffffbf", "#a6d96a", "#1a9641"],
  Greens: ["#edf8e9", "#bae4b3", "#74c476", "#31a354", "#006d2c"],
  Blues: ["#eff3ff", "#bdd7e7", "#6baed6", "#3182bd", "#08519c"],
  Set2: ["#66c2a5", "#fc8d62", "#8da0cb", "#e78ac3", "#a6d854", "#ffd92f", "#e5c494", "#b3b3b3"],
  Paired: ["#a6cee3", "#1f78b4", "#b2df8a", "#33a02c", "#fb9a99", "#e31a1c", "#fdbf6f", "#ff7f00", "#cab2d6", "#6a3d9a", "#ffff99", "#b15928"],
};

function hexToRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function rgbToHex(r, g, b) {
  const c = v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0");
  return `#${c(r)}${c(g)}${c(b)}`;
}
function sampleScheme(name, t) {
  const stops = SCHEMES[name] || SCHEMES.RdBu; // unknown scheme -> a safe default
  t = Math.max(0, Math.min(1, t));
  if (stops.length === 1) return stops[0];
  const pos = t * (stops.length - 1);
  const i = Math.min(Math.floor(pos), stops.length - 2);
  const f = pos - i;
  const a = hexToRgb(stops[i]), b = hexToRgb(stops[i + 1]);
  return rgbToHex(a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f, a[2] + (b[2] - a[2]) * f);
}

function numericProp(room, name) {
  const p = room.properties && room.properties[name];
  if (!p || p.value == null || p.value === "") return null;
  const n = parseFloat(p.value);
  return Number.isFinite(n) ? n : null;
}

function qualitative(scheme, k) {
  const stops = SCHEMES[scheme] || SCHEMES.Set2;
  return stops[k % stops.length];
}
function lighten(hex, t) {
  const [r, g, b] = hexToRgb(hex);
  return rgbToHex(r + (255 - r) * t, g + (255 - g) * t, b + (255 - b) * t);
}

function classKey(room, tierName) {
  const tv = (room.classification || []).find(t => t.tier === tierName);
  if (!tv || tv.undefined) return null;
  return tv.code != null ? tv.code : (tv.name != null ? tv.name : null);
}

function dateProp(room, name) {
  const p = room.properties && room.properties[name];
  return p && p.value != null && p.value !== "" ? p.value : null;
}

function parseDate(value, format) {
  if (value == null || value === "") return null;
  if (format) return parseStrftime(value, format);
  const ms = Date.parse(value);
  return Number.isFinite(ms) ? ms : null;
}

function parseStrftime(value, pattern) {
  const order = [];
  let regex = "^";
  for (let i = 0; i < pattern.length; i++) {
    if (pattern[i] !== "%") { regex += pattern[i].replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); continue; }
    i++;
    let nopad = false;
    if (pattern[i] === "-") { nopad = true; i++; }
    const spec = pattern[i];
    const num = nopad ? "\\d{1,2}" : "\\d{2}";
    switch (spec) {
      case "Y": regex += "(\\d{4})"; order.push("Y"); break;
      case "y": regex += "(\\d{2})"; order.push("y"); break;
      case "m": regex += `(${num})`; order.push("m"); break;
      case "d": regex += `(${num})`; order.push("d"); break;
      case "H": regex += `(${num})`; order.push("H"); break;
      case "I": regex += `(${num})`; order.push("I"); break;
      case "M": regex += `(${num})`; order.push("M"); break;
      case "S": regex += `(${num})`; order.push("S"); break;
      case "p": regex += "([AaPp][Mm])"; order.push("p"); break;
      case "z": regex += "(Z|[+-]\\d{2}:?\\d{2})"; order.push("z"); break;
      case "%": regex += "%"; break;
      default: return null; // unsupported specifier -> refuse to guess
    }
  }
  const m = new RegExp(regex + "$").exec(String(value).trim());
  if (!m) return null;
  const f = {};
  order.forEach((k, idx) => f[k] = m[idx + 1]);
  const year = f.Y != null ? +f.Y : (f.y != null ? 2000 + +f.y : null);
  if (year == null) return null;
  let hour = f.H != null ? +f.H : (f.I != null ? +f.I : 0);
  if (f.p && f.I != null) hour = (+f.I % 12) + (/pm/i.test(f.p) ? 12 : 0);
  let ms = Date.UTC(year, (f.m != null ? +f.m - 1 : 0), (f.d != null ? +f.d : 1), hour, (f.M != null ? +f.M : 0), (f.S != null ? +f.S : 0));
  if (f.z && f.z !== "Z") {
    const zm = /([+-])(\d{2}):?(\d{2})/.exec(f.z);
    if (zm) ms += (zm[1] === "-" ? 1 : -1) * ((+zm[2]) * 60 + (+zm[3])) * 60000; // shift to UTC
  }
  return ms;
}

function propertyCompareNumber(room, mode) {
  const a = numericProp(room, mode.property_a);
  const b = numericProp(room, mode.property_b);
  if (a == null || b == null) return null;
  if (mode.op === "ratio") return b === 0 ? null : a / b;
  return a - b; // "diff" (default)
}

function buildColourContext(rooms, plan) {
  const ctx = { maxAbs: 0 };
  if (!plan) return ctx;
  const mode = plan.mode;

  if (mode.kind === "propertycompare" && mode.colouring.style === "diverging") {
    for (const room of rooms) {
      const n = propertyCompareNumber(room, mode);
      if (n != null) ctx.maxAbs = Math.max(ctx.maxAbs, Math.abs(n));
    }
  } else if (mode.kind === "hierarchy") {
    const parentTier = (mode.tiers || [])[0];
    const childTier = (mode.tiers || [])[1];
    const parents = new Set();
    const childrenByParent = new Map(); // parentKey -> Set(childKey)
    for (const room of rooms) {
      const pk = parentTier ? classKey(room, parentTier) : null;
      if (pk == null) continue;
      parents.add(pk);
      if (childTier) {
        const ck = classKey(room, childTier);
        if (ck != null) {
          if (!childrenByParent.has(pk)) childrenByParent.set(pk, new Set());
          childrenByParent.get(pk).add(ck);
        }
      }
    }
    ctx.parentHue = new Map();
    [...parents].sort().forEach((pk, i) => ctx.parentHue.set(pk, qualitative(mode.scheme, i)));
    ctx.childColour = new Map(); // `${pk}\0${ck}` -> tinted hex
    for (const [pk, set] of childrenByParent) {
      const base = ctx.parentHue.get(pk);
      const list = [...set].sort();
      list.forEach((ck, j) => ctx.childColour.set(`${pk}\0${ck}`, lighten(base, list.length > 1 ? (j / (list.length - 1)) * 0.55 : 0)));
    }
    ctx.parentTier = parentTier;
    ctx.childTier = childTier;
  } else if (mode.kind === "daterange") {
    ctx.nearMs = parseDate(mode.near_date, null); // near_date is a plain YYYY-MM-DD from the editor
    ctx.maxPast = 0;
    for (const room of rooms) {
      const d = parseDate(dateProp(room, mode.property), mode.format);
      if (d == null || ctx.nearMs == null) continue;
      const delta = d - ctx.nearMs;
      if (delta <= 0) ctx.maxPast = Math.max(ctx.maxPast, -delta); // past/at only; future goes blue
    }
  }
  return ctx;
}

function colourForRoom(room, plan, ctx) {
  const mode = plan.mode;

  if (mode.kind === "hierarchy") {
    const pk = ctx.parentTier ? classKey(room, ctx.parentTier) : null;
    if (pk == null) return NO_DATA_COLOUR;
    if (ctx.childTier) {
      const ck = classKey(room, ctx.childTier);
      if (ck != null && ctx.childColour.has(`${pk}\0${ck}`)) return ctx.childColour.get(`${pk}\0${ck}`);
    }
    return ctx.parentHue.get(pk) || NO_DATA_COLOUR;
  }

  if (mode.kind === "daterange") {
    const d = parseDate(dateProp(room, mode.property), mode.format);
    if (d == null || ctx.nearMs == null) return NO_DATA_COLOUR;
    const delta = d - ctx.nearMs;
    if (delta > 0) return FUTURE_COLOUR;
    const t = ctx.maxPast > 0 ? 1 - (Math.abs(delta) / ctx.maxPast) : 1;
    return sampleScheme(mode.scheme, t);
  }

  if (mode.kind !== "propertycompare") return NO_DATA_COLOUR; // unknown mode
  const number = propertyCompareNumber(room, mode);
  if (number == null) return NO_DATA_COLOUR;

  const c = mode.colouring;
  if (c.style === "match") {
    return Math.abs(number) <= c.tolerance ? MATCH_COLOUR : MISMATCH_COLOUR;
  }
  if (c.style === "diverging") {
    const extent = ctx.maxAbs || 1;
    return sampleScheme(c.scheme, 0.5 + number / (2 * extent));
  }
  if (c.style === "bands") {
    // Ordered first-match scan over half-open [lo, hi). Simplicity earned by
    // the server-side validation (bands sorted/disjoint) — no overlap logic.
    for (const band of c.bands) {
      const aboveLo = band.lo == null || number >= band.lo;
      const belowHi = band.hi == null || number < band.hi;
      if (aboveLo && belowHi) return band.colour;
    }
    return NO_DATA_COLOUR;
  }
  return NO_DATA_COLOUR; // unknown colouring style
}

// ============================ per-zone render ============================

function setViewBox(zone) {
  zone.svg.setAttribute("viewBox", `${zone.view.x} ${zone.view.y} ${zone.view.w} ${zone.view.h}`);
  scheduleCull(zone); // hide/show rooms for the new view (throttled to a frame)
}

// A room's bounding box in the SVG's (Y-flipped) coordinate space — the same
// space as `zone.view`/the viewBox — computed from the outer loop's points, NOT
// from getBBox (which forces a synchronous layout). Stored once at paint time.
function roomBBox(room) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const raw of room.loops[0].points) {
    const p = flip(raw);
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  return { minX, minY, maxX, maxY };
}

// Viewport culling: hide rooms whose bbox is outside the current view (plus a
// margin so panning doesn't pop edges), show them again when they re-enter. SVG
// clips but does not cull — every element still costs per frame — so at a few
// thousand rooms a zoomed-in view is unusable without this. Only toggles a unit's
// nodes when its on/off state actually changes, so steady-state panning touches
// just the handful crossing the boundary, not the whole level.
function cullZone(zone) {
  const units = zone.cullUnits;
  if (!units || units.length === 0) return;
  const v = zone.view;
  const mx = v.w * 0.2, my = v.h * 0.2; // keep a 20%-of-view margin loaded
  const x0 = v.x - mx, y0 = v.y - my, x1 = v.x + v.w + mx, y1 = v.y + v.h + my;
  for (const u of units) {
    const off = u.maxX < x0 || u.minX > x1 || u.maxY < y0 || u.minY > y1;
    if (off !== u.hidden) {
      const d = off ? "none" : "";
      for (const n of u.nodes) n.style.display = d;
      u.hidden = off;
    }
  }
}

// One cull per animation frame, so a burst of wheel/drag events (each calling
// setViewBox) collapses to a single cull on the next frame rather than one per event.
function scheduleCull(zone) {
  if (zone._cullRaf) return;
  zone._cullRaf = requestAnimationFrame(() => { zone._cullRaf = 0; cullZone(zone); });
}

// Fitted bounds (padded) that frame a level's rooms. Both the on-screen refit
// and the SVG export frame to this, so the two can never disagree. Null when the
// rooms have no drawable geometry.
function fittedBounds(rooms) {
  const b = bounds(rooms);
  if (!b) return null;
  const w = b.maxX - b.minX, h = b.maxY - b.minY;
  const pad = Math.max(w, h) * 0.04 || 1;
  return { x: b.minX - pad, y: b.minY - pad, w: w + 2 * pad, h: h + 2 * pad };
}

// Pure painter: appends grid + room polygons + labels for one level into `svg`,
// framed to `fitted`. Reads nothing from a zone or module global — the colour
// plan, error set, and error toggle are passed in — so the live renderer and the
// SVG export share exactly one body and can't drift.
// When `cullUnits` (an array) is passed, each room's nodes + precomputed bbox are
// collected into it so the live view can hide off-screen rooms on pan/zoom
// (viewport culling). The SVG export passes none — an exported file needs every
// room, and a detached node has no view to cull against.
function paintLevel(svg, rooms, fitted, { colourPlan = null, errorRoomIds = null, showErrors = false, cullUnits = null, matchRoomIds = null, searchActive = false, showLabels = true } = {}) {
  const baseFont = Math.max(fitted.w, fitted.h) * 0.02;

  const g = document.createElementNS(SVG, "g");
  g.setAttribute("class", "grid");
  const step = 5;
  for (let gx = Math.ceil(fitted.x / step) * step; gx < fitted.x + fitted.w; gx += step)
    g.appendChild(line(gx, fitted.y, gx, fitted.y + fitted.h));
  for (let gy = Math.ceil(fitted.y / step) * step; gy < fitted.y + fitted.h; gy += step)
    g.appendChild(line(fitted.x, gy, fitted.x + fitted.w, gy));
  svg.appendChild(g);

  // Precompute the active plan's per-level scale context once (not per room).
  const colourCtx = colourPlan ? buildColourContext(rooms, colourPlan) : null;

  // A room's cull unit: its precomputed (flipped) bbox + every node that must
  // hide/show together. Keyed by room across the two paint passes so the label
  // (pass 2) joins the same unit as the polygons (pass 1).
  const units = cullUnits ? new Map() : null;

  // Two passes, not one: every room's polygons first, then every room's label.
  // SVG has no reliable z-index — paint order is DOM order — so appending all
  // polygons before any label guarantees labels always sit on top.
  for (const room of rooms) {
    if (!room.loops || room.loops.length === 0) continue;

    // Search state per room: a match gets `.match` (accent outline); when a
    // search is active every non-match gets `.dim` (rooms, holes and label), so
    // matches stand out. Composes with the `.error` highlight and colour-plan
    // fills — `.match` is a stroke, `.dim` is opacity.
    const isMatch = searchActive && matchRoomIds && matchRoomIds.has(room.id);
    const dimmed = searchActive && !isMatch;

    const outer = document.createElementNS(SVG, "polygon");
    outer.setAttribute("points", pointsAttr(room.loops[0]));
    let cls = "room";
    if (showErrors && errorRoomIds && errorRoomIds.has(room.id)) cls += " error";
    if (isMatch) cls += " match";
    if (dimmed) cls += " dim";
    outer.setAttribute("class", cls);
    // Fill precedence: an active colour plan wins over the error highlight and
    // the default --fill. Inline style beats the `.room` CSS rule; a
    // presentation attribute would lose to it. This inline fill is a resolved
    // literal, so it survives serialization into an exported .svg unchanged.
    if (colourPlan) outer.style.fill = colourForRoom(room, colourPlan, colourCtx);
    outer.appendChild(titleEl(room.name || room.id));
    svg.appendChild(outer);

    const nodes = units ? [outer] : null;
    for (let i = 1; i < room.loops.length; i++) {
      const hole = document.createElementNS(SVG, "polygon");
      hole.setAttribute("points", pointsAttr(room.loops[i]));
      hole.setAttribute("class", dimmed ? "hole dim" : "hole");
      svg.appendChild(hole);
      if (nodes) nodes.push(hole);
    }
    if (units) units.set(room, { room, ...roomBBox(room), nodes, hidden: false });
  }

  // Labels off skips the pass entirely (omitting elements beats styling them
  // away — an exported file then simply has no <text> nodes). Cull units are
  // unaffected: the label is always the LAST node pushed, so dropping it only
  // shortens the tail — applyHighlight's nodes[0] (the pass-1 room polygon)
  // and cullZone's plain iteration both survive either way.
  if (showLabels) for (const room of rooms) {
    if (!room.loops || room.loops.length === 0) continue;
    const label = addLabel(svg, room, baseFont);
    if (!label) continue;
    if (searchActive && !(matchRoomIds && matchRoomIds.has(room.id))) label.classList.add("dim");
    if (units) units.get(room).nodes.push(label);
  }

  if (cullUnits) for (const u of units.values()) cullUnits.push(u);
}

function renderLevel(zone, payload, levelId, { refit = true } = {}) {
  const plan = zone.svg;
  plan.replaceChildren();
  const rooms = roomsOnLevel(payload, levelId);

  if (rooms.length === 0) {
    if (refit) { zone.view = { ...zone.fitted }; setViewBox(zone); }
    return;
  }

  if (refit) {
    const fitted = fittedBounds(rooms);
    if (!fitted) return;
    zone.fitted = fitted;
    zone.view = { ...fitted };
    setViewBox(zone);
  }
  if (!zone.fitted) return; // no established frame yet (unbounded first render)

  zone.cullUnits = [];
  paintLevel(plan, rooms, zone.fitted, {
    colourPlan: zone.activeColourPlan,   // presentation: per zone
    errorRoomIds,                        // data-quality state: global
    showErrors,                          // follows the QA block's expansion (global)
    cullUnits: zone.cullUnits,
    matchRoomIds: searchMatchIds,        // one payload -> one match set
    searchActive,
    showLabels: showRoomLabels,
  });
  cullZone(zone); // hide off-screen rooms for the current view straight away

  // Re-add the areas overlay on top: renderLevel is the single choke point every
  // re-render (poll, colour, validation, level switch) passes through, so this
  // one call keeps the footprints painted without each caller knowing about them.
  if (zone.areasMode) renderAreasOverlay(zone);
}

// `room.label` is the server-resolved, ordered field list (settings.toml's
// `room_label`) — the browser renders whatever it's given. First field is the
// primary line; further fields stack below as smaller accent lines. `label`
// present-but-empty means the configured properties didn't resolve (respect
// it); `label` missing (an older payload) falls back to name/id.
function addLabel(svg, room, baseFont) {
  const fields = room.label !== undefined ? room.label : [room.name || room.id].filter(Boolean);
  if (fields.length === 0) return null;

  const box = loopBox(room.loops[0]);
  const longest = fields.reduce((n, f) => Math.max(n, String(f).length), 1);
  const widthLimited = (box.w * 0.9) / longest / 0.6;
  const heightLimited = (box.h * 0.8) / (1 + 0.7 * (fields.length - 1));
  const fontSize = Math.min(baseFont, widthLimited, heightLimited);
  if (!(fontSize > 0)) return null;

  const c = centroid(room.loops[0]);
  const label = document.createElementNS(SVG, "text");
  label.setAttribute("class", "label");
  label.setAttribute("x", c.x);
  label.setAttribute("y", c.y);
  label.setAttribute("font-size", fontSize);

  fields.forEach((text, i) => {
    const span = document.createElementNS(SVG, "tspan");
    span.setAttribute("x", c.x);
    span.textContent = text;
    if (i > 0) {
      span.setAttribute("class", "tag");
      span.setAttribute("dy", "1.2em");
      span.setAttribute("font-size", fontSize * 0.7);
    }
    label.appendChild(span);
  });

  svg.appendChild(label);
  return label;
}

// Populate this zone's level picker, highest elevation first.
function buildLevelControl(zone, payload, levels) {
  const sel = zone.els.levelSelect;
  sel.replaceChildren();
  const ordered = levels.slice().sort((a, b) => b.elevation - a.elevation);
  for (const lvl of ordered) {
    const count = roomsOnLevel(payload, lvl.id).length;
    const opt = document.createElement("option");
    opt.value = lvl.id;
    opt.textContent = `${lvl.name} (${count} rm)`;
    if (lvl.id === zone.activeLevelId) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.classList.toggle("hidden", levels.length <= 1);
}

function selectLevel(zone, levelId) {
  if (!currentPayload) return;
  zone.activeLevelId = levelId;
  renderLevel(zone, currentPayload, levelId, { refit: true });
  updateMeta(zone);
  // The overlay follows via renderLevel; the bottom band's figures span all
  // levels, so a level switch doesn't touch them.
}

function updateMeta(zone) {
  if (!currentPayload) return;
  const lvls = levelsForPayload(currentPayload);
  const active = lvls.find(l => l.id === zone.activeLevelId);
  const n = roomsOnLevel(currentPayload, zone.activeLevelId).length;
  const lvlName = active ? active.name : "—";
  // While a search is active, surface the match count (over the whole payload,
  // all levels — highlighting is visible only on this zone's shown level).
  const matches = searchActive && searchMatchIds
    ? ` · ${searchMatchIds.size} match${searchMatchIds.size === 1 ? "" : "es"}`
    : "";
  zone.els.meta.textContent = `${lvlName} · ${n} room${n === 1 ? "" : "s"} · v${currentPayload.schema_version} · ${new Date().toLocaleTimeString()}${matches}`;
  zone.els.meta.classList.remove("stale");
}

// Fan a freshly-changed payload out: the page-level half runs once (search
// fields + match set are payload-derived, not zone-derived), then each zone
// re-renders its own level from the shared payload.
function ingestAll(payload) {
  currentPayload = payload;
  // A new payload may add properties (a different project) — refresh the search
  // field checklist, then recompute the match set so the renders below carry
  // the highlight.
  refreshFieldsPanel();
  computeMatches();
  for (const zone of zones) ingestZone(zone);
  // The grid's column set is payload-derived (property keys + the response's
  // dRofus labels), so it is rebuilt here rather than on every render.
  gridColumns = buildGridColumns();
  renderGrid();
  // New room data means the footprints changed: refresh them (data + overlays
  // + band figures) while any zone has the mode open. Fire-and-forget.
  if (zones.some(z => z.areasMode)) loadAreas();
}

// Bring ONE zone up to date with the current global payload. Also the whole
// init a newly-added zone needs (see the add-zone handler).
function ingestZone(zone) {
  const payload = currentPayload;
  if (!payload) return;
  zone.els.empty.classList.add("hidden");
  zone.els.exportSvg.classList.remove("hidden"); // there's now something to export
  zone.els.areasToggle.classList.remove("hidden"); // footprints can be computed now

  const levels = levelsForPayload(payload);
  const prevLevelId = zone.activeLevelId;
  if (!levels.some(l => l.id === zone.activeLevelId)) {
    zone.activeLevelId = levels.length ? levels[0].id : null;
  }

  buildLevelControl(zone, payload, levels);
  // Refit (reset zoom/pan to the fitted view) only on the first render or when
  // the active level actually changed. A plain data re-push on the same level
  // keeps the user's current zoom rather than snapping back to fitted, which
  // read as zoom-specific stutter (see HANDOVER-viewer-performance.md). The
  // first render must fit: zone.fitted has to exist for a no-refit render, whose
  // grid/label sizing reads it. Explicit level switches still refit via
  // selectLevel.
  const refit = !zone.fitted || zone.activeLevelId !== prevLevelId;
  if (zone.activeLevelId) renderLevel(zone, payload, zone.activeLevelId, { refit });
  updateMeta(zone);
}

// ============================ colour picker ============================

function populateColourSelect(zone, plans) {
  const sel = zone.els.colourSelect;
  sel.replaceChildren();
  const none = document.createElement("option");
  none.value = "";
  none.textContent = "No colour";
  sel.appendChild(none);
  for (const p of plans) {
    const opt = document.createElement("option");
    opt.value = p.name;
    opt.textContent = p.name;
    sel.appendChild(opt);
  }
  sel.classList.toggle("hidden", plans.length === 0);
}

// Reset one zone's picker to the loaded plan list, applying the `active`
// default. Used on project change (every zone resets together) and to bring a
// newly-added zone up to speed. "No colour" always overrides, so `active` is
// just the default.
function applyColourPlans(zone) {
  populateColourSelect(zone, colourPlans);
  const active = colourPlans.find(p => p.active) || null;
  zone.activeColourPlan = active;
  zone.els.colourSelect.value = active ? active.name : "";
}

// Read the project's colour plans from the settings API — the viewer's one
// read-only use of /api/settings, once per project change (scope is global,
// so this is one fetch for the page, not one per zone).
async function loadColourPlans(pid) {
  try {
    // Resolving route (not the strict /api/settings/projects/{id} the editors
    // use): the viewer holds the *payload* project id, which is not a settings
    // project_id, so it needs the server's default-fallback to find the file
    // that carries this project's colour plans. See resolve_project_file.
    const data = await fetchJson(`/api/settings/resolve/${encodeURIComponent(pid)}`);
    colourPlans = (data.settings && data.settings.colour_plans) || [];
  } catch (err) {
    colourPlans = [];
  }
  for (const zone of zones) applyColourPlans(zone);
}

// ============================ scope pickers (header, global) =============
//
// One project/milestone/building selection for the whole page. Under the old
// per-zone scope these were populated per zone and carried per-zone diff
// signatures, a one-shot seed for zones[0] only, and a focus question ("whose
// scope does the URL persist?"). Global scope deletes all of that: one set of
// header <select>s, one signature each, no zones[0] special case.

const scopeEls = {
  project: document.getElementById("projectSelect"),
  milestone: document.getElementById("milestoneSelect"),
  building: document.getElementById("buildingSelect"),
};

function populateProjectSelect(projects) {
  const sel = scopeEls.project;
  const prevValue = sel.value;
  sel.replaceChildren();
  for (const p of projects) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  }
  sel.classList.toggle("hidden", projects.length === 0);
  if (projects.some(p => p.id === prevValue)) sel.value = prevValue;
}

function populateBuildingSelect(data) {
  const sel = scopeEls.building;
  const prevValue = sel.value;
  sel.replaceChildren();
  for (const b of data.buildings) {
    const opt = document.createElement("option");
    opt.value = b.key;
    let label = b.unclassified ? "Unclassified" : (b.name || b.code || b.key);
    if (b.ambiguous && b.name && b.code) label = `${b.name} (${b.code})`;
    opt.textContent = label;
    sel.appendChild(opt);
  }
  sel.classList.toggle("hidden", data.buildings.length <= 1);
  if (data.buildings.some(b => b.key === prevValue)) sel.value = prevValue;
}

function populateMilestoneSelect(data) {
  const sel = scopeEls.milestone;
  const prevValue = sel.value;
  sel.replaceChildren();
  const latest = document.createElement("option");
  latest.value = "";
  latest.textContent = "Latest";
  sel.appendChild(latest);
  for (const m of data.milestones) {
    const opt = document.createElement("option");
    opt.value = m.name;
    opt.textContent = `${m.name} (${m.date})`;
    sel.appendChild(opt);
  }
  sel.classList.toggle("hidden", data.milestones.length === 0);
  if (data.milestones.some(m => m.name === prevValue)) sel.value = prevValue;
}

// Refresh the global scope from the known-projects list; auto-select if the
// current project no longer exists. Diffs against the last-seen id list so
// the 2s tick doesn't fight an in-progress user selection.
async function refreshScope(projects) {
  // Colour plans depend only on the *current* project, not on whether the
  // project *list* changed — so load them before the early-return guard below.
  // Without this, the picker never appears in the steady state: the list is
  // unchanged every tick, so the code below the guard is unreachable. The
  // colourPlansProjectId guard keeps this to one fetch per project change.
  if (projectId && colourPlansProjectId !== projectId) {
    colourPlansProjectId = projectId;
    loadColourPlans(projectId);
  }

  const ids = projects.map(p => p.id).join(",");
  if (ids === lastProjectIds) return;
  lastProjectIds = ids;
  populateProjectSelect(projects);

  if (!projects.some(p => p.id === projectId)) {
    // Restore the project from URL/localStorage on first resolve; later
    // re-resolves keep the plain projects[0] default. A seed the server no
    // longer lists falls through to projects[0].
    let fallback = projects.length ? projects[0].id : null;
    if (!seededProject && projects.length) {
      seededProject = true; // one-shot, so a later project deletion re-defaults cleanly
      const seed = seedProjectId();
      if (seed && projects.some(p => p.id === seed)) fallback = seed;
    }
    projectId = fallback;
    // Sync the picker to the resolved/restored project. populateProjectSelect
    // above runs before this block, so on a first-load restore it would
    // otherwise leave the dropdown showing projects[0] while the page renders
    // the restored project — a confusing mismatch.
    if (projectId) scopeEls.project.value = projectId;
    lastBuildingsSignature = null;
    lastMilestonesSignature = null;
    milestone = null;
    if (projectId) {
      loadValidation(projectId);
      // Colour plans load via the guarded block above; a reset changes
      // projectId, so the guard re-fires on the next tick.
    }
  }
  if (projectId) {
    await loadBuildings(projectId);
    await loadMilestones(projectId);

    // Restore building/milestone from the URL once, after their option lists
    // exist — and only if the freshly-loaded lists still contain them (stale
    // scope falls away, same discipline as the project seed). A second
    // one-shot flag so the 2s poll's picker refreshes never clobber a later
    // manual change. building/milestone are URL-only (never localStorage).
    if (!seededScope) {
      seededScope = true;
      const hasOpt = (sel, v) => Array.from(sel.options).some(o => o.value === v);
      const b = urlParam("building");
      if (b && hasOpt(scopeEls.building, b)) {
        buildingKey = b;
        scopeEls.building.value = b;
        lastRevision = null;
      }
      const m = urlParam("milestone");
      if (m && hasOpt(scopeEls.milestone, m)) {
        milestone = m;
        scopeEls.milestone.value = m;
        lastRevision = null;
      }

      // Seed cross-page persistence from a restored/deep-linked selection too,
      // so the viewer matches settings/comparison (whose restore persists via
      // their selectProject). Writes the project id to localStorage + URL and
      // mirrors the actual current scope — a URL value, or the auto-selected
      // building — back into the URL, replacing any stale scope the deep-link
      // carried. This is why a bookmarked viewer link carries the project to
      // the other pages.
      persistSelection(projectId, { building: buildingKey, milestone });
    }
  }
}

async function loadBuildings(pid) {
  let data;
  try {
    data = await fetchJson(`/projects/${encodeURIComponent(pid)}/buildings`);
  } catch (err) {
    return;
  }
  const signature = `${data.tier_configured}:${data.buildings.map(b => b.key).join(",")}`;
  if (signature === lastBuildingsSignature) return;
  lastBuildingsSignature = signature;
  populateBuildingSelect(data);

  if (!data.buildings.some(b => b.key === buildingKey)) {
    buildingKey = data.buildings.length ? data.buildings[0].key : null;
  }
}

async function loadMilestones(pid) {
  let data;
  try {
    data = await fetchJson(`/projects/${encodeURIComponent(pid)}/milestones`);
  } catch (err) {
    return;
  }
  const signature = data.milestones.map(m => `${m.name}@${m.date}`).join(",");
  if (signature === lastMilestonesSignature) return;
  lastMilestonesSignature = signature;
  populateMilestoneSelect(data);

  if (milestone && !data.milestones.some(m => m.name === milestone)) {
    milestone = null;
    scopeEls.milestone.value = "";
    lastRevision = null; // selection changed under us -> re-render next tick
  }
}

// ============================ validation (QA band) ============================
//
// An on-demand health check, not part of the room poll. Fetched once when the
// project changes, or via the band's Refresh button. Everything is
// page-level: one report, one error set, ONE results block in the bottom
// band whose collapsed strip doubles as the old header badge ("▸ QA · ⚠ 3").
// Expanding the block turns on the plans' error highlighting (`showErrors`),
// mirroring the old panel-open-shows-errors behaviour.

function section(title, items, renderItem) {
  if (items.length === 0) return "";
  return `<section><h3>${title} (${items.length})</h3><ul>${items.map(renderItem).join("")}</ul></section>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function renderFieldCoverage(coverage) {
  if (!coverage || coverage.length === 0) return "";
  return `<section><h3>Field coverage (${coverage.length})</h3><ul>${coverage.map(c =>
    `<li class="${c.checked ? "ok" : ""}">${escapeHtml(c.label)}: ${c.checked ? "yes" : "no"}`
    + `${c.revit_property ? ` (${escapeHtml(c.revit_property)})` : ""}</li>`
  ).join("")}</ul></section>`;
}

// Update the globals from a fresh report and reflect it into the QA band.
function renderValidation(data) {
  currentValidation = data;
  errorRoomIds = data.drofus_configured
    ? new Set([
        ...data.rooms_missing_link_value,
        ...data.duplicate_link_values.flatMap(d => d.room_ids),
        ...data.rooms_unmatched_in_drofus,
        ...data.property_mismatches.map(m => m.room_id),
        ...data.fields_absent_in_revit.map(m => m.room_id),
        ...data.fields_empty_in_revit.map(m => m.room_id),
      ])
    : new Set();

  const band = document.getElementById("qaBand");
  if (!data.drofus_configured) {
    band.classList.add("hidden");
    updateRegionEmpty();
    setShowErrors(false);
    return;
  }
  band.classList.remove("hidden");
  updateRegionEmpty();

  // Fresh error set: re-highlight open plans without disturbing pan/zoom.
  if (showErrors) rerenderZones();

  // The server now tallies this (data.discrepancies.total); fall back to the
  // per-list sum for an older server that doesn't send the summary.
  const issueCount = data.discrepancies?.total ?? (
    data.rooms_missing_link_value.length + data.duplicate_link_values.length
    + data.rooms_unmatched_in_drofus.length + data.property_mismatches.length
    + data.fields_absent_in_revit.length + data.fields_empty_in_revit.length);

  const open = !document.getElementById("qaBody").classList.contains("hidden");
  document.getElementById("qaHead").innerHTML =
    `${open ? "▾" : "▸"} QA · ` + (issueCount ? `<span class="issues">⚠ ${issueCount}</span>` : "✓");

  // Each entry names its room via `data-room`, which makes it a jump target
  // into band 2 rather than a place to repeat the row's detail (see the
  // delegated handler below). Cheap to allow for now, expensive to retrofit.
  const at = (id) => ` data-room="${escapeHtml(id)}"`;
  const html = [
    `<p>${data.total_rooms} room(s) checked against link property <strong>${escapeHtml(data.link_property)}</strong>.</p>`,
    section("Missing link value", data.rooms_missing_link_value, id => `<li${at(id)}>${escapeHtml(id)}</li>`),
    section("Duplicate link values", data.duplicate_link_values,
      d => `<li>${escapeHtml(d.value)}: ${d.room_ids.map(id => `<span${at(id)}>${escapeHtml(id)}</span>`).join(", ")}</li>`),
    section("Unmatched in dRofus", data.rooms_unmatched_in_drofus, id => `<li${at(id)}>${escapeHtml(id)}</li>`),
    section("Property mismatches", data.property_mismatches, m =>
      `<li class="mismatch"${at(m.room_id)}>room ${escapeHtml(m.room_id)} · ${escapeHtml(m.field)}: `
      + `"${escapeHtml(m.room_value)}" vs dRofus "${escapeHtml(m.drofus_value)}"</li>`),
    section("Field absent in Revit", data.fields_absent_in_revit, m =>
      `<li class="mismatch"${at(m.room_id)}>room ${escapeHtml(m.room_id)} · ${escapeHtml(m.field)}</li>`),
    section("Field empty in Revit", data.fields_empty_in_revit, m =>
      `<li class="mismatch"${at(m.room_id)}>room ${escapeHtml(m.room_id)} · ${escapeHtml(m.field)}</li>`),
  ].join("");

  document.getElementById("qaContent").innerHTML =
    (issueCount ? html : `<p class="ok">No issues found.</p>`) + renderFieldCoverage(data.field_coverage);

  // A fresh report re-addresses the grid's QA marks.
  rebuildGridErrorIndex();
  renderGrid();
}

// Error highlighting is page state tracking the QA block: set + re-render.
function setShowErrors(on) {
  if (showErrors === on) return;
  showErrors = on;
  rerenderZones();
}

// Re-render every zone's current level in place (refit:false — never disturb
// pan/zoom for a presentation change).
function rerenderZones() {
  if (!currentPayload) return;
  for (const zone of zones) {
    if (zone.activeLevelId) renderLevel(zone, currentPayload, zone.activeLevelId, { refit: false });
  }
}

async function loadValidation(pid) {
  if (!pid) return;
  try {
    const data = await fetchJson(`/projects/${encodeURIComponent(pid)}/validation`);
    renderValidation(data);
  } catch (err) {
    // transient fetch failure -- leave the last-known validation state alone
  }
}

function csvEscape(value) {
  const s = String(value);
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function buildValidationCsv(data) {
  // room_number / room_name / link-value come from the server's per-room detail
  // (error_rooms), keyed by room_id; the link-value column is headed by the
  // link property name (e.g. "Number"). Older servers omit these -> blank cells.
  const info = data.error_rooms || {};
  const linkHeader = data.link_property || "link_value";
  const rows = [["room_id", "room_number", "room_name", linkHeader, "error"]];
  const push = (id, error) => {
    const r = info[id] || {};
    rows.push([id, r.number || "", r.name || "", r.link_value || "", error]);
  };
  for (const id of data.rooms_missing_link_value) push(id, "missing link value");
  for (const dup of data.duplicate_link_values)
    for (const id of dup.room_ids) push(id, `duplicate link value: ${dup.value}`);
  for (const id of data.rooms_unmatched_in_drofus) push(id, "unmatched in dRofus");
  for (const m of data.property_mismatches)
    push(m.room_id, `property mismatch: ${m.field} (room="${m.room_value}" vs dRofus="${m.drofus_value}")`);
  for (const m of data.fields_absent_in_revit) push(m.room_id, `field absent in Revit: ${m.field}`);
  for (const m of data.fields_empty_in_revit) push(m.room_id, `field empty in Revit: ${m.field}`);
  return rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
}

// Shared by both panels' Download-CSV buttons: turn CSV text into a download.
function downloadCsv(filename, csvText) {
  const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement("a"), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function downloadValidationCsv() {
  if (!currentValidation || !currentValidation.drofus_configured) return;
  downloadCsv(`validation-${projectId || "project"}.csv`, buildValidationCsv(currentValidation));
}

// ============================ SVG export ============================

// The plan's visual styling lives in this page's <style> (colours) and
// tokens.css (the palette). A saved .svg leaves the browser and references
// neither, so it must carry its own <style>. Structural values (stroke widths,
// dash, non-scaling-stroke) mirror the `.room`/`.hole`/`.grid` rules above;
// colours are read live from the resolved CSS custom properties so they never
// drift from the page. `--fill-hover` is interactive-only and omitted.
function exportStyleBlock() {
  const cs = getComputedStyle(document.documentElement);
  const v = (name) => cs.getPropertyValue(name).trim();
  return `
    .grid line { stroke: ${v('--rule')}; stroke-width: 0.5; vector-effect: non-scaling-stroke; }
    .room { fill: ${v('--fill')}; stroke: ${v('--ink')}; stroke-width: 1.5; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .room.error { fill: ${v('--error')}; }
    .hole { fill: ${v('--paper')}; stroke: ${v('--ink')}; stroke-width: 1; stroke-dasharray: 4 3; vector-effect: non-scaling-stroke; }
    .label { fill: ${v('--ink')}; text-anchor: middle; dominant-baseline: middle; }
    .label .tag { fill: ${v('--accent')}; letter-spacing: 0.05em; }
  `;
}

// Build ONE standalone, self-contained SVG document string for a single level,
// framed to that level's own fitted bounds (never the zone's current pan/zoom).
// Returns null for a level with no drawable rooms. Reuses `paintLevel`, so the
// exported geometry is identical to what's on screen.
const EXPORT_WIDTH_PX = 1600;
function buildLevelSvgFile(payload, levelId, { withErrors = false, colourPlan = null, errorRoomIds = null, showLabels = true } = {}) {
  const rooms = roomsOnLevel(payload, levelId);
  const fitted = fittedBounds(rooms);
  if (!fitted) return null;

  const svg = document.createElementNS(SVG, "svg");
  svg.setAttribute("xmlns", SVG);
  svg.setAttribute("viewBox", `${fitted.x} ${fitted.y} ${fitted.w} ${fitted.h}`);
  svg.setAttribute("width", EXPORT_WIDTH_PX);
  svg.setAttribute("height", Math.max(1, Math.round(EXPORT_WIDTH_PX * fitted.h / fitted.w)));

  const style = document.createElementNS(SVG, "style");
  style.textContent = exportStyleBlock();
  svg.appendChild(style);

  // Opaque paper background covering the viewBox, so the file isn't transparent
  // when pasted onto a white/dark surface. First child = painted first = behind.
  const bg = document.createElementNS(SVG, "rect");
  bg.setAttribute("x", fitted.x);
  bg.setAttribute("y", fitted.y);
  bg.setAttribute("width", fitted.w);
  bg.setAttribute("height", fitted.h);
  bg.setAttribute("fill", getComputedStyle(document.documentElement).getPropertyValue('--paper').trim());
  svg.appendChild(bg);

  paintLevel(svg, rooms, fitted, { colourPlan, errorRoomIds, showErrors: withErrors, showLabels });

  return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
}

// A filesystem-safe, self-describing name: roomplan_<project>_<level>[_<milestone>][_errors].svg
function svgFilename(levelName, withErrors) {
  const safe = (s, fallback) =>
    (s ? String(s) : "").replace(/[^a-z0-9._-]+/gi, "-").replace(/^-+|-+$/g, "") || fallback;
  const parts = ["roomplan", safe(projectId, "project"), safe(levelName, "level")];
  if (milestone) parts.push(safe(milestone, "milestone"));
  if (withErrors) parts.push("errors");
  return parts.join("_") + ".svg";
}

function downloadSvg(svgText, filename) {
  const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

// Export EVERY building level of this zone's current payload, one standalone
// .svg per level. One click -> N downloads: browsers show a one-time "allow
// multiple downloads" permission and can throttle rapid clicks, so the files are
// emitted with a small stagger. Error highlighting follows the validation panel
// (`showErrors`), which is only on once validation is loaded — so an exported
// "errors" file is never a silent empty highlight.
async function exportZoneLevels(zone) {
  if (!currentPayload) return;
  const levels = levelsForPayload(currentPayload);
  if (levels.length === 0) return;
  const withErrors = showErrors; // follows the QA band, like the on-screen plans
  for (const lvl of levels) {
    const svgText = buildLevelSvgFile(currentPayload, lvl.id, {
      withErrors,
      colourPlan: zone.activeColourPlan, // per-zone presentation still applies
      errorRoomIds,
      showLabels: showRoomLabels, // export follows the header toggle
    });
    if (!svgText) continue; // level with no drawable rooms
    downloadSvg(svgText, svgFilename(lvl.name, withErrors));
    await new Promise((r) => setTimeout(r, 150));
  }
}

// ============================ hierarchy areas ============================

function areasUrl() {
  const params = new URLSearchParams();
  if (buildingKey) params.set("building", buildingKey);
  if (milestone) params.set("milestone", milestone);
  const qs = params.toString();
  return `/projects/${encodeURIComponent(projectId)}/areas${qs ? "?" + qs : ""}`;
}

// Fetch the dissolved footprints for the global scope, then refresh this
// zone's tier picker, overlay, and summary. On-demand (NOT on the 2s room
// poll): areas are derived and heavier than a room fetch, and only needed
// while the mode is on — re-fetched on toggle-on and whenever real new room
// data arrives (see ingestZone). Per-zone because the mode, tier, and level
// are presentation; two zones with areas on fetch twice, acceptably.
async function loadAreas() {
  if (!projectId) return;
  try {
    areasData = await fetchJson(areasUrl());
  } catch (err) {
    areasData = null;
  }
  // One dataset feeds every open overlay and the band's figures.
  for (const zone of zones) {
    if (!zone.areasMode) continue;
    populateAreasTier(zone);
    renderAreasOverlay(zone);
  }
  populateAreasBandTier();
  renderAreasBand();
}

// Tier labels come from the group paths: path depth i carries that tier's label.
function tierNames(data) {
  const names = [];
  for (const g of (data && data.groups) || [])
    g.path.forEach((t, i) => { if (names[i] === undefined) names[i] = t.tier; });
  return names;
}

function populateAreasTier(zone) {
  const sel = zone.els.areasTier;
  const names = tierNames(areasData);
  sel.replaceChildren();
  names.forEach((name, depth) => {
    const opt = document.createElement("option");
    opt.value = String(depth);
    opt.textContent = name;
    sel.appendChild(opt);
  });
  if (zone.areasTier >= names.length) zone.areasTier = 0;
  sel.value = String(zone.areasTier);
  sel.classList.toggle("hidden", !zone.areasMode || names.length === 0);
}

// The band's own tier picker: same option list, independent selection — the
// figures need not follow any one zone's overlay tier.
function populateAreasBandTier() {
  const sel = document.getElementById("areasBandTier");
  const names = tierNames(areasData);
  sel.replaceChildren();
  names.forEach((name, depth) => {
    const opt = document.createElement("option");
    opt.value = String(depth);
    opt.textContent = name;
    sel.appendChild(opt);
  });
  if (areasBandTier >= names.length) areasBandTier = 0;
  sel.value = String(areasBandTier);
}

// Identity of a classification prefix — matches server area-groups to client
// rooms by the same (code,name,undefined) tuple everything else resolves.
function tierSig(t) { return `${t.code == null ? "" : t.code}|${t.name == null ? "" : t.name}|${t.undefined ? "U" : ""}`; }
function pathKey(path, depth) { return path.slice(0, depth + 1).map(tierSig).join("/"); }
function tierLabel(t) { return t.undefined ? `undefined ${t.tier}` : (t.name || t.code || t.tier); }

// A footprint ring is [[x,y],…] in model coords; flip Y for the SVG's Y-down space.
function ringPointsAttr(ring) { return ring.map(([x, y]) => `${x},${-y}`).join(" "); }

function ringAreaAbs(ring) {
  let a = 0;
  for (let i = 0; i < ring.length; i++) {
    const [x1, y1] = ring[i], [x2, y2] = ring[(i + 1) % ring.length];
    a += x1 * y2 - x2 * y1;
  }
  return Math.abs(a) / 2;
}

// Axis-aligned bbox of a footprint ring ([[x,y],…], model coords). Used to size
// the tier label against the polygon it names. Note this OVERSTATES the usable
// interior for L-shaped or concave dissolved footprints — hence the deliberately
// conservative 0.7 width factor at the call site rather than addLabel()'s 0.9.
function ringBox(ring) {
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const [x, y] of ring) {
    if (x < x0) x0 = x;
    if (x > x1) x1 = x;
    if (y < y0) y0 = y;
    if (y > y1) y1 = y;
  }
  return { w: x1 - x0, h: y1 - y0 };
}

function ringCentroid(ring) {
  let a = 0, cx = 0, cy = 0;
  for (let i = 0; i < ring.length; i++) {
    const [x1, y1] = ring[i], [x2, y2] = ring[(i + 1) % ring.length];
    const cross = x1 * y2 - x2 * y1;
    a += cross; cx += (x1 + x2) * cross; cy += (y1 + y2) * cross;
  }
  if (Math.abs(a) < 1e-9) {
    const n = ring.length || 1;
    return { x: ring.reduce((s, p) => s + p[0], 0) / n, y: ring.reduce((s, p) => s + p[1], 0) / n };
  }
  return { x: cx / (3 * a), y: cy / (3 * a) };
}

// Net area of one room = its outer loop minus its holes (shoelace, model coords).
// The dissolved footprint is always >= the summed net of its rooms; the gap is
// wall zones + filled voids (see HANDOVER-hierarchy-areas.md "Naming").
function roomNetArea(room) {
  if (!room.loops || room.loops.length === 0) return 0;
  const ringArea = (loop) => {
    const p = loop.points;
    let a = 0;
    for (let i = 0; i < p.length; i++) {
      const q = p[(i + 1) % p.length];
      a += p[i].x * q.y - q.x * p[i].y;
    }
    return Math.abs(a) / 2;
  };
  let area = ringArea(room.loops[0]);
  for (let i = 1; i < room.loops.length; i++) area -= ringArea(room.loops[i]);
  return Math.max(0, area);
}

// Groups on this zone's active level at its overlay tier, in server order.
function activeAreaGroups(zone) {
  if (!areasData) return [];
  const depth = zone.areasTier;
  return areasData.groups.filter(g => g.level_id === zone.activeLevelId && g.path.length === depth + 1);
}

// Draw the dissolved footprints for the active level at the selected tier, on
// top of the (ghosted) rooms. Rebuilt on every render/level/tier change; removed
// when the mode is off. Called at the end of renderLevel so it survives the
// poll/colour/validation re-renders that replaceChildren() the plan.
function renderAreasOverlay(zone) {
  const svg = zone.svg;
  const existing = svg.querySelector(".areas-overlay");
  if (existing) existing.remove();
  svg.classList.toggle("areas-active", zone.areasMode);
  if (!zone.areasMode || !areasData) return;
