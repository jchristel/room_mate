  const groups = activeAreaGroups(zone);
  if (groups.length === 0) return;

  const depth = zone.areasTier;
  const g = document.createElementNS(SVG, "g");
  g.setAttribute("class", "areas-overlay");
  const baseFont = Math.max(zone.fitted.w, zone.fitted.h) * 0.022;

  groups.forEach((grp, i) => {
    const colour = qualitative("Set2", i);
    for (const ring of grp.rings) {
      if (!ring || ring.length < 3) continue;
      const poly = document.createElementNS(SVG, "polygon");
      poly.setAttribute("points", ringPointsAttr(ring));
      poly.setAttribute("class", grp.counted_upward ? "area-poly" : "area-poly faded");
      poly.style.fill = colour;
      poly.style.stroke = colour;
      g.appendChild(poly);
    }
    const big = grp.rings.reduce((a, b) => (b && ringAreaAbs(b) > ringAreaAbs(a || []) ? b : a), grp.rings[0]);
    if (big && big.length >= 3) {
      const text = tierLabel(grp.path[depth]);
      // Fit the label to its ring, mirroring addLabel()'s room-label sizing:
      // baseFont is the ceiling, the polygon's own bbox the constraint. 0.6 is
      // the mono glyph aspect ratio; 0.7 (vs 0.9 for rooms) leaves margin for
      // the concave footprints a bbox can't see.
      const bb = ringBox(big);
      const widthLimited = (bb.w * 0.7) / Math.max(text.length, 1) / 0.6;
      const heightLimited = bb.h * 0.8;
      const fontSize = Math.min(baseFont, widthLimited, heightLimited);
      // Groups too small to carry legible text get no label at all — a
      // sub-pixel speck is worse than nothing, and the summary panel already
      // names every group. (Unlike room labels, where the same threshold was
      // removed as a bug: a suppressed room label had no other surface.)
      if (fontSize >= baseFont * 0.25) {
        const c = ringCentroid(big);
        const label = document.createElementNS(SVG, "text");
        label.setAttribute("class", "area-label");
        label.setAttribute("x", c.x);
        label.setAttribute("y", -c.y);
        label.setAttribute("font-size", fontSize);
        label.textContent = text;
        g.appendChild(label);
      }
    }
  });
  svg.appendChild(g);
}

// The band's figures: EVERY level at the band's selected tier — each group's
// dissolved FOOTPRINT area (server) beside its summed NET room area (client)
// and the difference, with per-level subtotals and a grand total. All-levels
// where the old overlay panel was active-level-only, because the band belongs
// to the scope, not to any zone's level pick — the zone overlays remain the
// per-level view.
function renderAreasBand() {
  const band = document.getElementById("areasBand");
  const content = document.getElementById("areasContent");
  const anyOpen = zones.some(z => z.areasMode);
  band.classList.toggle("hidden", !anyOpen || !areasData);
  updateRegionEmpty();
  if (!anyOpen || !areasData) { content.innerHTML = ""; return; }

  const depth = areasBandTier;
  const levelName = new Map((areasData.levels || []).map(l => [l.id, l.name]));
  const groups = areasData.groups.filter(g => g.path.length === depth + 1);

  // Net room area per (level, path-prefix), same identity the CSV export uses.
  const net = new Map();
  for (const r of (currentPayload ? currentPayload.rooms : [])) {
    if (!r.classification || r.classification.length < depth + 1) continue;
    const key = `${r.level_id}|${pathKey(r.classification, depth)}`;
    net.set(key, (net.get(key) || 0) + roomNetArea(r));
  }

  const fmt = (n) => n.toLocaleString(undefined, { maximumFractionDigits: 1 });
  // Group rows by level, keeping server order within each level (colour index
  // parity with the overlays, which use per-level server order too).
  const byLevel = new Map();
  for (const g of groups) {
    if (!byLevel.has(g.level_id)) byLevel.set(g.level_id, []);
    byLevel.get(g.level_id).push(g);
  }

  let grandF = 0, grandN = 0;
  const rows = [...byLevel.entries()].map(([lvlId, lvlGroups]) => {
    let tF = 0, tN = 0;
    const lvl = escapeHtml(levelName.get(lvlId) || lvlId);
    const body = lvlGroups.map((grp, i) => {
      const netA = net.get(`${lvlId}|${pathKey(grp.path, depth)}`) || 0;
      tF += grp.area; tN += netA;
      const colour = qualitative("Set2", i);
      const flag = grp.counted_upward ? "" : ` <span class="uncounted">(not counted up)</span>`;
      return `<tr><td class="lvl">${i === 0 ? lvl : ""}</td>
        <td><span class="swatch" style="background:${colour}"></span>${escapeHtml(tierLabel(grp.path[depth]))}${flag}</td>
        <td>${fmt(grp.area)}</td><td>${fmt(netA)}</td><td>${fmt(grp.area - netA)}</td></tr>`;
    }).join("");
    grandF += tF; grandN += tN;
    return body + `<tr class="total"><td class="lvl"></td><td>${lvl} total</td><td>${fmt(tF)}</td><td>${fmt(tN)}</td><td>${fmt(tF - tN)}</td></tr>`;
  }).join("");

  content.innerHTML = groups.length
    ? `<p class="note">Dissolved footprint vs summed net room area (model units²), every level in scope. Δ = wall zones + filled voids.</p>
       <table><thead><tr><th class="lvl">Level</th><th>Group</th><th>Footprint</th><th>Net</th><th>Δ</th></tr></thead>
       <tbody>${rows}<tr class="total"><td class="lvl"></td><td>All levels</td><td>${fmt(grandF)}</td><td>${fmt(grandN)}</td><td>${fmt(grandF - grandN)}</td></tr></tbody></table>`
    : `<p class="note">No footprints at this tier.</p>`;
}

// Export every group's footprint across ALL levels and tiers (not just the
// active view the panel shows) as CSV: level, one column per tier, then the
// server footprint area, the client-summed net room area, their Δ, and whether
// the group counts toward tiers above it. Reuses the same roomNetArea/pathKey
// the summary uses, generalised past the active level/tier.
function buildAreasCsv() {
  const data = areasData;
  if (!data || !data.groups || data.groups.length === 0) return "";
  const levelName = new Map((data.levels || []).map(l => [l.id, l.name]));
  const tiers = tierNames(data);

  // Net room area per (level, depth, path-prefix) over every room, so each
  // group at any depth on any level can look up its summed net directly.
  const net = new Map();
  for (const r of (currentPayload ? currentPayload.rooms : [])) {
    if (!r.classification) continue;
    for (let d = 0; d < r.classification.length; d++) {
      const key = `${r.level_id}|${d}|${pathKey(r.classification, d)}`;
      net.set(key, (net.get(key) || 0) + roomNetArea(r));
    }
  }

  const num = (x) => Math.round(x * 1000) / 1000; // trim float-noise tails, no locale separators
  const rows = [["level", ...tiers, "footprint", "net", "delta", "counted_up"]];
  for (const g of data.groups) {
    const depth = g.path.length - 1;
    const netA = net.get(`${g.level_id}|${depth}|${pathKey(g.path, depth)}`) || 0;
    const tierCells = tiers.map((_, i) => (i < g.path.length ? tierLabel(g.path[i]) : ""));
    rows.push([
      levelName.get(g.level_id) || g.level_id,
      ...tierCells,
      num(g.area), num(netA), num(g.area - netA),
      g.counted_upward ? "yes" : "no",
    ]);
  }
  return rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
}

function downloadAreasCsv() {
  if (!areasData || !areasData.groups || areasData.groups.length === 0) return;
  downloadCsv(`areas-${projectId || "project"}.csv`, buildAreasCsv());
}

// ==================== bottom region, band 2: source-data grid ====================
//
// A read-only grid over the rooms of the CURRENT SCOPE — every level, not the
// levels on screen. That is deliberate and worth restating, because a level
// filter feels like it "should" follow the plans: with several zones showing
// different levels there is no single answer, and it would make the grid's
// contents depend on presentation state, reintroducing exactly the
// scope/presentation blur the global-scope migration removed. Filtering by
// level stays available as an ordinary column filter, driven by the user.
//
// Model-derived and dRofus-derived columns are grouped and visually separated
// rather than interleaved: STRATEGY-SOURCES keeps dRofus a distinct
// sub-object ("store raw, join late") precisely because the two have
// different lifecycles, and an interleaved table would imply a single source
// of truth the data model deliberately doesn't have.

// An empty region must not reserve its dragged height — with nothing to show
// that would just be a band of blank paper eating plan area.
function updateRegionEmpty() {
  const anyVisible = ["qaBand", "areasBand", "gridBand"]
    .some(id => !document.getElementById(id).classList.contains("hidden"));
  document.getElementById("bottomRegion").classList.toggle("empty", !anyVisible);
  // A band appearing or disappearing can make the split meaningful or moot.
  updateBandDivide();
}

const GRID_ROW_H = 20;      // px; fixed so a row's offset is index * height
const GRID_OVERSCAN = 8;    // rows rendered beyond the viewport, to hide scroll seams

let gridColumns = [];       // [{ key, label, source: "model"|"drofus", get(room), unmapped }]
let gridRows = [];          // rooms after filter + sort (the windowed row list)
let gridSort = { key: null, asc: true };
const gridFilters = new Map(); // column key -> lowercased filter text
let gridScrollTop = 0;
// QA marks, at the finest address the report supports. `compute_validation`
// keys its field-level findings by (room, field), which in this grid IS a
// (row, column) address — so a mismatch is marked *on the disagreeing cell*
// rather than only listed in band 1. Room-level findings (no link value,
// unmatched, duplicate) have no column, so they mark the Id cell instead.
let gridCellErrors = new Set(); // `${roomId}\0${revitProperty}`
let gridRoomErrors = new Set(); // roomId

function rebuildGridErrorIndex() {
  gridCellErrors = new Set();
  gridRoomErrors = new Set();
  const d = currentValidation;
  if (!d || !d.drofus_configured) return;
  for (const m of d.property_mismatches) gridCellErrors.add(`${m.room_id}\0${m.field}`);
  for (const m of d.fields_absent_in_revit) gridCellErrors.add(`${m.room_id}\0${m.field}`);
  for (const m of d.fields_empty_in_revit) gridCellErrors.add(`${m.room_id}\0${m.field}`);
  for (const id of d.rooms_missing_link_value) gridRoomErrors.add(id);
  for (const id of d.rooms_unmatched_in_drofus) gridRoomErrors.add(id);
  for (const dup of d.duplicate_link_values) for (const id of dup.room_ids) gridRoomErrors.add(id);
}

// Intrinsic columns first — the identity a reader scans by — then the room's
// own property keys. `$level` resolves through the payload's level list, which
// is why it isn't just another property.
function buildGridColumns() {
  const cols = [];
  if (!currentPayload) return cols;

  const levelName = new Map(levelsForPayload(currentPayload).map(l => [l.id, l.name]));
  cols.push({ key: "$level", label: "Level", source: "model", get: r => levelName.get(r.level_id) || r.level_id || "" });
  cols.push({ key: "$name", label: "Name", source: "model", get: r => r.name || "" });
  cols.push({ key: "$id", label: "Id", source: "model", get: r => r.id || "" });

  const propKeys = new Set();
  for (const r of currentPayload.rooms) for (const k of Object.keys(r.properties || {})) propKeys.add(k);
  for (const k of [...propKeys].sort()) {
    cols.push({ key: `p:${k}`, label: k, source: "model", get: r => (r.properties?.[k]?.value) ?? "" });
  }

  // dRofus columns come from the response's own label set, NOT a union of the
  // rooms' joined fields: a column that matched no room in scope would
  // otherwise be invisible — precisely the case the coverage report goes out
  // of its way to show as "not checked" rather than omit. `reconciliation`
  // marks which columns have a Revit counterpart; the rest render as unmapped.
  const labels = (currentPayload.drofus_labels || {})[projectId];
  if (labels) {
    const mapped = labels.reconciliation || {};
    for (const label of labels.all_labels || []) {
      cols.push({
        key: `d:${label}`, label, source: "drofus",
        unmapped: !(label in mapped),
        // An unmatched room simply has no `drofus` key — empty cells, never an
        // error (an unmatched link value is a signal, not a failure).
        get: r => (r.drofus?.fields?.[label]) ?? "",
      });
    }
  }
  return cols;
}

function visibleGridColumns() {
  const model = document.getElementById("srcModel").checked;
  const drofus = document.getElementById("srcDrofus").checked;
  return gridColumns.filter(c => (c.source === "model" ? model : drofus));
}

// Rooms after every active column filter, then the active sort. Sorting is
// numeric when both sides parse, so "10" doesn't sort before "9".
function computeGridRows() {
  const cols = visibleGridColumns();
  const active = cols.filter(c => gridFilters.get(c.key));
  let rows = currentPayload ? currentPayload.rooms : [];
  if (active.length) {
    rows = rows.filter(r => active.every(c => String(c.get(r)).toLowerCase().includes(gridFilters.get(c.key))));
  } else {
    rows = rows.slice();
  }

  const sortCol = cols.find(c => c.key === gridSort.key);
  if (sortCol) {
    const dir = gridSort.asc ? 1 : -1;
    rows.sort((a, b) => {
      const x = sortCol.get(a), y = sortCol.get(b);
      const nx = parseFloat(x), ny = parseFloat(y);
      if (Number.isFinite(nx) && Number.isFinite(ny) && nx !== ny) return (nx - ny) * dir;
      return String(x).localeCompare(String(y)) * dir;
    });
  }
  gridRows = rows;
}

// Header: a group row (Model | dRofus, spanning their columns) over a names
// row carrying sort, over a filter row.
//
// Rebuilt ONLY when the column set changes — a sort or filter keystroke just
// restyles the existing cells. That matters for more than cost: re-rendering
// the head would detach the filter <input> the user is typing into, losing
// focus and caret mid-word.
let gridHeadSig = null;
function renderGridHead(cols) {
  const table = document.getElementById("gridTable");
  let thead = table.querySelector("thead");
  if (!thead) { thead = document.createElement("thead"); table.appendChild(thead); }

  const sig = cols.map(c => c.key).join("|");
  if (sig === gridHeadSig) {
    // Same columns: only the sort indicator can have changed.
    for (const th of thead.querySelectorAll("tr.names th")) {
      th.classList.toggle("sorted", th.dataset.key === gridSort.key);
      th.classList.toggle("asc", th.dataset.key === gridSort.key && gridSort.asc);
    }
    return;
  }
  gridHeadSig = sig;

  const groups = [];
  for (const c of cols) {
    const last = groups[groups.length - 1];
    if (last && last.source === c.source) last.span++;
    else groups.push({ source: c.source, span: 1 });
  }

  const groupRow = groups.map(g =>
    `<th class="group-cell src-${g.source}" colspan="${g.span}"><span>${g.source === "model" ? "Model" : "dRofus"}</span></th>`
  ).join("");

  const nameRow = cols.map(c => {
    const sorted = gridSort.key === c.key ? ` sorted${gridSort.asc ? " asc" : ""}` : "";
    const unmapped = c.unmapped ? " unmapped" : "";
    const title = c.unmapped ? ` title="${escapeHtml(c.label)} — no Revit property mapped (not QA-checked)"` : "";
    return `<th class="src-${c.source}${sorted}${unmapped}" data-key="${escapeHtml(c.key)}"${title}>${escapeHtml(c.label)}</th>`;
  }).join("");

  const filterRow = cols.map(c =>
    `<th class="src-${c.source}"><input data-key="${escapeHtml(c.key)}" value="${escapeHtml(gridFilters.get(c.key) || "")}" placeholder="filter" /></th>`
  ).join("");

  thead.innerHTML = `<tr class="group">${groupRow}</tr><tr class="names">${nameRow}</tr><tr id="gridFilters">${filterRow}</tr>`;
}

// Row windowing: only the visible slice is ever in the DOM, with two spacer
// rows standing in for the rest of the scroll height. This is the
// one-dimensional case of paintLevel's cull units — same idea (precompute
// each item's extent, render only what's in view), applied to rows instead of
// room bboxes, rather than a second pattern invented for the same problem.
function renderGridBody(cols) {
  const table = document.getElementById("gridTable");
  let tbody = table.querySelector("tbody");
  if (!tbody) { tbody = document.createElement("tbody"); table.appendChild(tbody); }

  const scroll = document.getElementById("gridScroll");
  const viewH = scroll.clientHeight || 200;
  const first = Math.max(0, Math.floor(gridScrollTop / GRID_ROW_H) - GRID_OVERSCAN);
  const count = Math.ceil(viewH / GRID_ROW_H) + GRID_OVERSCAN * 2;
  const last = Math.min(gridRows.length, first + count);

  const span = cols.length || 1;
  const before = first * GRID_ROW_H;
  const after = Math.max(0, (gridRows.length - last) * GRID_ROW_H);

  const parts = [];
  if (before > 0) parts.push(`<tr class="spacer"><td colspan="${span}" style="height:${before}px"></td></tr>`);
  for (let i = first; i < last; i++) {
    const room = gridRows[i];
    const roomBad = gridRoomErrors.has(room.id);
    const cells = cols.map(c => {
      const v = String(c.get(room));
      // A field-level finding marks its own cell; a room-level one (which has
      // no column) marks the Id cell.
      const bad = c.key.startsWith("p:")
        ? gridCellErrors.has(`${room.id}\0${c.key.slice(2)}`)
        : (c.key === "$id" && roomBad);
      return `<td class="src-${c.source}${bad ? " err" : ""}" title="${escapeHtml(v)}">${escapeHtml(v)}</td>`;
    }).join("");
    parts.push(`<tr data-room="${escapeHtml(room.id)}" style="height:${GRID_ROW_H}px">${cells}</tr>`);
  }
  if (after > 0) parts.push(`<tr class="spacer"><td colspan="${span}" style="height:${after}px"></td></tr>`);
  tbody.innerHTML = parts.join("");
}

// Full grid refresh: columns -> rows -> head + windowed body. Called on new
// data, a source toggle, a sort, or a filter change.
function renderGrid() {
  const band = document.getElementById("gridBand");
  if (!currentPayload || !currentPayload.rooms || currentPayload.rooms.length === 0) {
    band.classList.add("hidden");
    updateRegionEmpty();
    return;
  }
  band.classList.remove("hidden");
  updateRegionEmpty();

  const cols = visibleGridColumns();
  computeGridRows();

  const empty = document.getElementById("gridEmpty");
  const scroll = document.getElementById("gridScroll");
  if (cols.length === 0) {
    scroll.classList.add("hidden");
    empty.classList.remove("hidden");
    empty.textContent = "No columns shown — enable Model or dRofus above.";
  } else {
    scroll.classList.remove("hidden");
    empty.classList.add("hidden");
    renderGridHead(cols);
    renderGridBody(cols);
  }

  const total = currentPayload.rooms.length;
  document.getElementById("gridCount").textContent =
    gridRows.length === total ? `${total} rooms` : `${gridRows.length} of ${total} rooms`;
}

// Scroll: re-window only (columns and row set are unchanged), throttled to a
// frame like cullZone's own scheduler.
let gridRaf = 0;
function onGridScroll() {
  gridScrollTop = document.getElementById("gridScroll").scrollTop;
  if (gridRaf) return;
  gridRaf = requestAnimationFrame(() => {
    gridRaf = 0;
    const cols = visibleGridColumns();
    if (cols.length) renderGridBody(cols);
  });
}

// Scroll the grid to a room and mark it — the jump target band 1 needs so a
// mismatch entry can point at its row instead of duplicating the detail.
function gridScrollToRoom(roomId) {
  const idx = gridRows.findIndex(r => r.id === roomId);
  if (idx < 0) return false;
  const scroll = document.getElementById("gridScroll");
  scroll.scrollTop = Math.max(0, idx * GRID_ROW_H - scroll.clientHeight / 2);
  onGridScroll();
  requestAnimationFrame(() => {
    const row = document.querySelector(`#gridTable tbody tr[data-room="${CSS.escape(roomId)}"]`);
    if (row) row.classList.add("target");
  });
  return true;
}

// CSV of what is on screen: the visible columns in order, every filtered row
// (not just the windowed slice), honouring the source toggle. Client-side,
// the same "a CSV is a presentation reshuffle of data the browser already
// has" line as the validation and areas exports.
function buildGridCsv() {
  const cols = visibleGridColumns();
  if (cols.length === 0) return "";
  const rows = [cols.map(c => (c.source === "drofus" ? `drofus.${c.label}` : c.label))];
  for (const room of gridRows) rows.push(cols.map(c => c.get(room)));
  return rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
}

function downloadGridCsv() {
  if (!gridRows.length) return;
  downloadCsv(`rooms-${projectId || "project"}.csv`, buildGridCsv());
}

// ============================ room search (global) ============================
//
// One search box + a field checklist, applied to EVERY zone. Matching is a local
// substring scan over rooms already in memory; highlighting toggles classes on
// the already-rendered nodes (the cull-unit room->nodes map) rather than
// rebuilding the SVG — so it stays smooth at thousands of rooms. See the plan /
// HANDOVER for why this is frontend-only.

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Intrinsic/aggregate field keys carry a friendly label; raw property keys show
// verbatim.
const SEARCH_FIELD_LABELS = { "$name": "Name", "$id": "Id", "$classification": "Classification", "$drofus": "dRofus" };
function searchFieldLabel(key) { return SEARCH_FIELD_LABELS[key] || key; }

// Every field the search can look at: the intrinsic/aggregate keys plus the
// union of raw property keys across the loaded payload (one payload for the
// page — every zone shows the same scope).
function availableSearchFields() {
  const props = new Set();
  for (const r of (currentPayload ? currentPayload.rooms : []))
    for (const k of Object.keys(r.properties || {})) props.add(k);
  return ["$name", "$id", "$classification", "$drofus", ...[...props].sort()];
}

// True when `q` (already lowercased) is a substring of any ENABLED field's value.
function roomMatches(room, q, fields) {
  const hit = (v) => v != null && String(v).toLowerCase().includes(q);
  if (fields.has("$name") && hit(room.name)) return true;
  if (fields.has("$id") && hit(room.id)) return true;
  if (fields.has("$classification") && room.classification &&
      room.classification.some(t => hit(t.name) || hit(t.code))) return true;
  if (fields.has("$drofus") && room.drofus && room.drofus.fields &&
      Object.values(room.drofus.fields).some(hit)) return true;
  const props = room.properties || {};
  for (const k in props) if (fields.has(k) && hit(props[k].value)) return true;
  return false;
}

// Recompute the match set over the WHOLE payload (level-independent, so a
// level switch re-paints with the same set). One payload -> one match set,
// shared by every zone; each zone only differs in which level's matches are
// on screen.
function computeMatches() {
  const q = searchQuery.trim().toLowerCase();
  searchActive = q.length > 0;
  if (!q || !currentPayload) { searchMatchIds = null; return; }
  const ids = new Set();
  for (const r of currentPayload.rooms) if (roomMatches(r, q, searchFields)) ids.add(r.id);
  searchMatchIds = ids;
}

// Fast path: toggle `.match`/`.dim` on the already-rendered nodes via the
// cull-unit room->nodes map (nodes[0] = room polygon, rest = holes + label).
function applyHighlight(zone) {
  for (const u of (zone.cullUnits || [])) {
    const isMatch = searchActive && searchMatchIds && searchMatchIds.has(u.room.id);
    u.nodes[0].classList.toggle("match", !!isMatch);
    for (let i = 0; i < u.nodes.length; i++) u.nodes[i].classList.toggle("dim", searchActive && !isMatch);
  }
}

// Recompute once, then re-highlight every zone and refresh its match count.
function applySearch() {
  computeMatches();
  for (const z of zones) {
    applyHighlight(z);
    updateMeta(z);
  }
}
const debouncedApplySearch = debounce(applySearch, 200);

// Build/refresh the field checklist. Preserves existing ticks; a genuinely new
// field (from a newly loaded project) defaults on. First build ticks everything
// — the "all fields" default.
function refreshFieldsPanel() {
  const panel = document.getElementById("fieldsPanel");
  if (!panel) return;
  const fields = availableSearchFields();
  const known = new Set([...panel.querySelectorAll("input")].map(i => i.value));
  if (!searchFieldsInitialised) {
    fields.forEach(f => searchFields.add(f));
    searchFieldsInitialised = true;
  } else {
    fields.forEach(f => { if (!known.has(f)) searchFields.add(f); }); // new field -> on
  }

  panel.replaceChildren();
  const actions = document.createElement("div");
  actions.className = "fields-actions";
  const mkAction = (text, fn) => {
    const a = document.createElement("a");
    a.textContent = text;
    a.addEventListener("click", fn);
    return a;
  };
  actions.appendChild(mkAction("All", () => { fields.forEach(f => searchFields.add(f)); refreshFieldsPanel(); applySearch(); }));
  actions.appendChild(mkAction("None", () => { searchFields.clear(); refreshFieldsPanel(); applySearch(); }));
  panel.appendChild(actions);

  for (const f of fields) {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = f;
    cb.checked = searchFields.has(f);
    cb.addEventListener("change", () => {
      if (cb.checked) searchFields.add(f); else searchFields.delete(f);
      applySearch();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + searchFieldLabel(f)));
    panel.appendChild(label);
  }
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  debouncedApplySearch();
});
document.getElementById("fieldsToggle").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("fieldsPanel").classList.toggle("hidden");
});
// Click outside the search cluster closes the field panel.
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search")) document.getElementById("fieldsPanel").classList.add("hidden");
});

// ============================ polling (global) ============================
//
// One scope -> ONE fetch and ONE poll cursor per tick, fanned out to every
// zone. This deletes the bug class where two zones on the same project could
// drift a tick apart (each used to carry its own cursor and fetch).

// Build the /rooms URL from the global project/building/milestone selection.
function roomsUrl() {
  const params = new URLSearchParams();
  if (projectId) params.set("project", projectId);
  if (buildingKey) params.set("building", buildingKey);
  if (projectId && milestone) params.set("milestone", milestone);
  const qs = params.toString();
  return qs ? `/rooms?${qs}` : "/rooms";
}

// Every zone's meta line reports poll-level states (waiting / connection lost)
// identically — they share the one fetch.
function metaAll(text) {
  for (const zone of zones) {
    zone.els.meta.textContent = text;
    zone.els.meta.classList.add("stale");
  }
}

async function poll() {
  try {
    const res = await fetch(roomsUrl(), { cache: "no-store" });
    if (res.status === 204) { metaAll("waiting for data"); return; }
    if (!res.ok) throw new Error(res.status);
    const payload = await res.json();
    // Change-detection compares the server's one-value content revision instead
    // of re-stringifying the whole payload every poll (see the `revision` field
    // in rooms.rs / HANDOVER-viewer-performance.md). A quiet system returns the
    // same revision every tick, so `ingestAll` (full teardown + rebuild) never
    // fires between real pushes. Fall back to a stringify only if an older
    // server omits the field, so the viewer still updates against one.
    const incoming = payload.revision ?? JSON.stringify(payload);
    if (incoming !== lastRevision) {
      lastRevision = incoming;
      ingestAll(payload); // re-fits + rebuilds level controls only on real change
    }
  } catch (err) {
    metaAll("connection lost");
  }
}

// ============================ view linking ============================

// Apply a view to a zone and repaint its viewBox.
function applyView(zone, v) {
  zone.view = { ...v };
  setViewBox(zone);
}

// Route a gesture's resulting view: linked -> every zone gets the SAME view;
// unlinked -> just the origin zone. When linked, each zone zooms around the
// origin zone's cursor point (all zones receive one `v`) — the correct,
// locked-together behaviour; the anchor is not recomputed per zone.
function commitView(originZone, v) {
  if (linkViews) {
    for (const z of zones) applyView(z, v);
  } else {
    applyView(originZone, v);
  }
}

// Attach pan/zoom to one zone's SVG. Each handler computes the new transform
// against THAT zone's view, then routes it through commitView.
function wireInteractions(zone) {
  const svg = zone.svg;
  let dragging = false, last = null;

  svg.addEventListener("pointerdown", e => {
    dragging = true; last = { x: e.clientX, y: e.clientY };
    svg.setPointerCapture(e.pointerId);
  });
  svg.addEventListener("pointerup", () => { dragging = false; });

  svg.addEventListener("pointermove", e => {
    if (!dragging) return;
    const rect = svg.getBoundingClientRect();
    const v = { ...zone.view };
    v.x -= (e.clientX - last.x) / rect.width * v.w;
    v.y -= (e.clientY - last.y) / rect.height * v.h;
    last = { x: e.clientX, y: e.clientY };
    commitView(zone, v);
  });

  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const v = { ...zone.view };
    const mx = v.x + (e.clientX - rect.left) / rect.width * v.w;
    const my = v.y + (e.clientY - rect.top) / rect.height * v.h;
    const k = e.deltaY > 0 ? 1.1 : 0.9;
    v.x = mx - (mx - v.x) * k;
    v.y = my - (my - v.y) * k;
    v.w *= k; v.h *= k;
    commitView(zone, v);
  }, { passive: false });

  svg.addEventListener("dblclick", () => commitView(zone, zone.fitted));
}

// ============================ zone lifecycle ============================

// Presentation-only controls: level, colour, validation visibility, export,
// areas. Scope handlers live on the header pickers (see "header controls").
function wireZoneControls(zone) {
  const e = zone.els;
  e.levelSelect.addEventListener("change", () => selectLevel(zone, e.levelSelect.value));

  e.colourSelect.addEventListener("change", () => {
    // Re-render the current level with refit:false so pan/zoom is preserved —
    // a pure presentation change. No /rooms refetch.
    zone.activeColourPlan = e.colourSelect.value ? (colourPlans.find(p => p.name === e.colourSelect.value) || null) : null;
    if (currentPayload && zone.activeLevelId) renderLevel(zone, currentPayload, zone.activeLevelId, { refit: false });
  });

  e.exportSvg.addEventListener("click", () => exportZoneLevels(zone));

  e.areasToggle.addEventListener("click", () => {
    zone.areasMode = !zone.areasMode;
    e.areasToggle.classList.toggle("on", zone.areasMode);
    if (zone.areasMode) {
      loadAreas(); // fetch (shared) + this overlay + the band's figures
    } else {
      e.areasTier.classList.add("hidden");
      renderAreasOverlay(zone); // removes the overlay + un-ghosts rooms
      renderAreasBand();        // hides the band when no zone has areas open
    }
  });
  e.areasTier.addEventListener("change", () => {
    zone.areasTier = parseInt(e.areasTier.value, 10) || 0;
    renderAreasOverlay(zone); // this zone's overlay only; the band has its own tier
  });
}

// Build one zone: clone the template, wire its presentation state, controls,
// and interactions. Zones carry NO scope and no poll/validation/colour-config
// state — all global — so a new zone needs no seeding from its siblings: it
// catches up from the globals (see the add-zone handler).
function createZone() {
  const id = `zone-${zoneSeq++}`;
  const frag = zoneTemplate.content.cloneNode(true);
  const root = frag.querySelector(".zone");
  const q = (sel) => root.querySelector(sel);

  const zone = {
    id, root,
    svg: q("svg.plan"),
    view: { x: 0, y: 0, w: 100, h: 100 },
    fitted: { x: 0, y: 0, w: 100, h: 100 },
    activeLevelId: null,
    cullUnits: null,   // per-room {bbox, nodes} for viewport culling on pan/zoom
    _cullRaf: 0,       // pending requestAnimationFrame id, throttles the cull
    // presentation state — everything a zone still owns
    activeColourPlan: null,
    areasMode: false,  // this zone's footprint overlay on/off
    areasTier: 0,      // this zone's overlay tier (0 = outermost, e.g. Building)
    els: {
      colourSelect: q(".colourSelect"),
      levelSelect: q(".levelSelect"),
      exportSvg: q(".export-svg"),
      areasToggle: q(".areas-toggle"),
      areasTier: q(".areasTier"),
      meta: q(".meta"),
      empty: q(".empty"),
    },
  };

  wireZoneControls(zone);
  wireInteractions(zone);
  zonesEl.appendChild(root);
  zones.push(zone);
  return zone;
}

function removeZone() {
  if (zones.length <= 1) return;
  const zone = zones.pop();
  zone.root.remove();
  setLayout();
}

// The grid column count follows the zone count, capped at 3 (rows wrap beyond).
function setLayout() {
  zonesEl.style.gridTemplateColumns = `repeat(${Math.min(zones.length, 3)}, 1fr)`;
  document.getElementById("removeZone").disabled = zones.length <= 1;
}

// ============================ polling loop ============================

// Each tick: refresh the scope pickers (cheap, signature-gated — also how a
// newly-pushed project shows up without a reload), then ONE scoped /rooms
// fetch fanned out to every zone. Tick cost no longer scales with zone count.
async function tick() {
  let projects = null;
  try {
    projects = await fetchJson("/projects");
  } catch (err) {
    // Connection issue: skip the picker refresh and let poll() surface it.
  }
  if (projects) await refreshScope(projects);
  await poll();
}

// ============================ bottom-region controls ============================
//
// Each block collapses to its one-line summary strip. The QA strip carries the
// count the old header badge did, so nothing was lost by moving the panel down.

// Expand/collapse one block, returning the new open state.
function toggleBand(bodyId, headId, label) {
  const body = document.getElementById(bodyId);
  const open = body.classList.toggle("hidden") === false;
  const head = document.getElementById(headId);
  head.innerHTML = (open ? "▾ " : "▸ ") + label();
  // `.open` on the block is what lets an expanded block share band 1's height
  // with a sibling while a collapsed one stays a single strip.
  body.closest(".result-band").classList.toggle("open", open);
  updateBandDivide();
  // Expanding takes height from the grid, so its visible row count changed.
  onGridScroll();
  return open;
}

// The band 1 / band 2 divider is only meaningful when a band-1 block is
// expanded AND the grid is present — otherwise there are not two things to
// split. Also re-clamps a dragged height that no longer fits (e.g. after the
// region itself was shrunk, or a block collapsed).
function updateBandDivide() {
  const band1 = document.getElementById("band1");
  const divide = document.getElementById("bandDivide");
  const anyOpen = !!band1.querySelector(".result-band.open:not(.hidden)");
  const gridShown = !document.getElementById("gridBand").classList.contains("hidden");
  divide.classList.toggle("hidden", !(anyOpen && gridShown));
  if (!anyOpen) {
    // Nothing expanded: drop any dragged height so collapsed strips don't
    // hold on to space they no longer need.
    band1.classList.remove("sized");
  }
  updateBand1Max();
  if (band1.classList.contains("sized")) clampBand1();
}

// The floor the grid keeps when band 1 is dragged large: its own toolbar and
// sticky header plus a couple of data rows. Measured rather than guessed, so
// it stays right if the bar wraps to two lines on a narrow window.
function gridMinHeight() {
  const bar = document.getElementById("gridBar").offsetHeight || 30;
  const head = document.querySelector("#gridTable thead")?.offsetHeight || 40;
  return bar + head + GRID_ROW_H * 2;
}

// How much height band 1 may take: everything the region has, less the two
// handles and the grid's own floor. Applies to BOTH the content-sized default
// (via the `--band1-max` cap) and any dragged height, so a tall results table
// can never squeeze the grid out of existence — which is what it did before
// this cap existed.
function band1Available() {
  const region = document.getElementById("bottomRegion");
  const handles = document.getElementById("regionDrag").offsetHeight
    + document.getElementById("bandDivide").offsetHeight;
  return Math.max(40, region.clientHeight - handles - gridMinHeight());
}

function updateBand1Max() {
  document.getElementById("band1").style.setProperty("--band1-max", `${Math.round(band1Available())}px`);
}

// Re-clamp a dragged height after the region itself changed size.
function clampBand1() {
  const band1 = document.getElementById("band1");
  const current = parseFloat(band1.style.getPropertyValue("--band1-h")) || band1.getBoundingClientRect().height;
  band1.style.setProperty("--band1-h", `${Math.round(Math.max(40, Math.min(current, band1Available())))}px`);
}

document.getElementById("gridScroll").addEventListener("scroll", onGridScroll);
for (const id of ["srcModel", "srcDrofus"]) {
  document.getElementById(id).addEventListener("change", () => {
    gridScrollTop = 0;
    document.getElementById("gridScroll").scrollTop = 0;
    renderGrid();
  });
}
// Sort and filter are delegated off <thead>, which is rebuilt on every render.
document.getElementById("gridTable").addEventListener("click", (e) => {
  const th = e.target.closest("thead tr.names th");
  if (!th) return;
  const key = th.dataset.key;
  gridSort = gridSort.key === key ? { key, asc: !gridSort.asc } : { key, asc: true };
  renderGrid();
});
document.getElementById("gridTable").addEventListener("input", debounce((e) => {
  const input = e.target.closest("#gridFilters input");
  if (!input) return;
  const key = input.dataset.key;
  const v = input.value.trim().toLowerCase();
  if (v) gridFilters.set(key, v); else gridFilters.delete(key);
  gridScrollTop = 0;
  document.getElementById("gridScroll").scrollTop = 0;
  renderGrid(); // the head survives (same columns), so focus/caret are kept
}, 200));
document.getElementById("gridClearFilters").addEventListener("click", () => {
  gridFilters.clear();
  renderGrid();
});
document.getElementById("gridDownload").addEventListener("click", () => downloadGridCsv());

// ---- two drags: the region's outer edge, and the band 1 / band 2 split ----
//
// Shared plumbing: pointer capture, a `dragging` class, and a per-move
// callback. Both handles resize by *pixels from the drag start* rather than
// by tracking the cursor absolutely, so neither drifts if a clamp bites.
function wireDragHandle(handle, onStart, onMove) {
  let startY = 0, start = 0;
  handle.addEventListener("pointerdown", (e) => {
    startY = e.clientY;
    start = onStart();
    handle.classList.add("dragging");
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  handle.addEventListener("pointermove", (e) => {
    if (!handle.classList.contains("dragging")) return;
    onMove(start, e.clientY - startY);
    onGridScroll(); // either drag changes the grid's visible row count
  });
  const stop = () => handle.classList.remove("dragging");
  handle.addEventListener("pointerup", stop);
  handle.addEventListener("pointercancel", stop);
}

// The region's total height, against the plans. Dragging UP makes it taller.
(() => {
  const region = document.getElementById("bottomRegion");
  wireDragHandle(
    document.getElementById("regionDrag"),
    () => region.getBoundingClientRect().height,
    (startH, dy) => {
      // Clamped so the region can neither vanish nor swallow the plans.
      const h = Math.min(Math.max(startH - dy, 80), window.innerHeight * 0.75);
      region.style.setProperty("--bottom-h", `${Math.round(h)}px`);
      // A taller/shorter region changes what band 1 may take, both as a cap
      // on the content-sized default and as a clamp on a dragged height.
      updateBand1Max();
      if (document.getElementById("band1").classList.contains("sized")) clampBand1();
    }
  );
})();

// The split between band 1 (results) and band 2 (the table), *within* the
// region's height: dragging DOWN gives the results more and the table less.
// The region total doesn't move, so the plans are untouched either way.
(() => {
  const band1 = document.getElementById("band1");
  const region = document.getElementById("bottomRegion");
  wireDragHandle(
    document.getElementById("bandDivide"),
    () => {
      // First drag switches band 1 from content-sized to explicitly sized,
      // starting at exactly its current height so nothing jumps.
      const h = band1.getBoundingClientRect().height;
      band1.style.setProperty("--band1-h", `${Math.round(h)}px`);
      band1.classList.add("sized");
      return h;
    },
    (startH, dy) => {
      const h = Math.max(40, Math.min(startH + dy, band1Available()));
      band1.style.setProperty("--band1-h", `${Math.round(h)}px`);
    }
  );
})();

// ============================ boot ============================

createZone();
setLayout();
tick();
setInterval(tick, 2000);
</script>
